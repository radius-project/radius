emit:
  - "@azure-tools/typespec-autorest"
options:
  "@azure-tools/typespec-autorest":
    use-read-only-status-schema: true
    azure-resource-provider-folder: "resource-manager"
    examples-dir: "{project-root}/examples"
    emitter-output-dir: "{project-root}/../../swagger/specification/applications"
    arm-types-dir: "{project-root}/../../swagger/specification/common-types/resource-management"
    output-file: "{azure-resource-provider-folder}/{service-name}/{version-status}/{version}/openapi.json"
  "@azure-tools/typespec-go":
    emitter-output-dir: "{project-root}/.tsp-go-tmp"
    module: "github.com/radius-project/radius/pkg/messagingrp/api/v20231001preview"
    file-prefix: "zz_generated_"
    generate-fakes: false
    azcore-version: "1.21.1"
    license:
      name: "Apache License 2.0"
      header: "Licensed under the Apache License, Version 2.0 . See LICENSE in the repository root for license information."
