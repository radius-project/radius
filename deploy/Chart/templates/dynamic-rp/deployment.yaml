{{- $appversion := include "radius.versiontag" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    control-plane: dynamic-rp
    app.kubernetes.io/name: dynamic-rp
    app.kubernetes.io/part-of: radius
  name: dynamic-rp
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
     app.kubernetes.io/name: dynamic-rp
  template:
    metadata:
      labels:
        control-plane: dynamic-rp
        app.kubernetes.io/name: dynamic-rp
        app.kubernetes.io/part-of: radius
        {{- if eq .Values.global.azureWorkloadIdentity.enabled true }}
        azure.workload.identity/use: "true"
        {{- end }}
      {{- if eq .Values.global.prometheus.enabled true }}
      annotations:
        prometheus.io/path: "{{ .Values.global.prometheus.path }}"
        prometheus.io/port: "{{ .Values.global.prometheus.port }}"
        prometheus.io/scrape: "{{ .Values.global.prometheus.enabled }}"
      {{- end }}
    spec:
      serviceAccountName: dynamic-rp
      {{- if and .Values.dynamicrp.buildkit.enabled (eq .Values.dynamicrp.buildkit.psaMode "restricted") }}
      # User namespaces let the rootless BuildKit sidecar satisfy
      # PodSecurityAdmission "restricted" without Unconfined profiles.
      # Requires Kubernetes >= 1.30 with the UserNamespacesSupport
      # feature gate enabled (stable in 1.33).
      hostUsers: false
      {{- end }}
      {{- if .Values.dynamicrp.buildkit.enabled }}
      # fsGroup makes shared emptyDir volumes (notably the BuildKit
      # unix socket directory) group-owned by GID 65532 so the
      # dynamic-rp container (UID/GID 65532) can dial a socket
      # created by the buildkitd sidecar (UID 1000).
      securityContext:
        fsGroup: 65532
      {{- end }}
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 6 }}
      {{- end }}
      {{- if eq .Values.global.terraform.enabled true }}
      # Init container to pre-download Terraform binary to a shared volume
      # This avoids downloading Terraform at runtime and improves recipe execution performance
      initContainers:
      {{- if .Values.global.appendRootCA.cert }}
      - name: append-root-ca
        image: "{{ .Values.rp.image }}:{{ .Values.rp.tag | default $appversion }}"
        command:
        - sh
        - -c
        - |
          mkdir -p /etc/radius-ssl/certs
          cp /etc/ssl/certs/* /etc/radius-ssl/certs/
          cat >> /etc/radius-ssl/certs/ca-certificates.crt <<'CERTEOF'
        {{ .Values.global.appendRootCA.cert | nindent 10 }}
          CERTEOF
        volumeMounts:
        - name: ssl-certs
          mountPath: /etc/radius-ssl/certs
      {{- end }}
      - name: terraform-init
        image: "alpine:3.23"
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Terraform init container starting..."
          echo "Running on architecture: $(uname -m)"
          echo "Alpine version: $(cat /etc/alpine-release)"
          
          # Create terraform directory
          mkdir -p "{{ .Values.dynamicrp.terraform.path }}"
          echo "Created directory: {{ .Values.dynamicrp.terraform.path }}"
          
          # Detect architecture for terraform download
          ARCH=$(uname -m)
          case $ARCH in
            x86_64) TERRAFORM_ARCH="amd64" ;;
            aarch64|arm64) TERRAFORM_ARCH="arm64" ;;
            *) echo "ERROR: Unsupported architecture: $ARCH"; exit 1 ;;
          esac
          echo "Terraform architecture: $TERRAFORM_ARCH"
          
          # Install wget and unzip if not available (Alpine doesn't include them by default)
          if ! which wget >/dev/null 2>&1 || ! which unzip >/dev/null 2>&1; then
            echo "Installing wget and unzip..."
            apk add --no-cache wget unzip || { echo "ERROR: Failed to install wget/unzip"; exit 3; }
          fi
          
          # Determine download URL
          TERRAFORM_URL="{{ .Values.global.terraform.downloadUrl }}"
          
          # If no custom URL provided, fetch latest version from HashiCorp API
          if [[ -z "$TERRAFORM_URL" ]]; then
            echo "Fetching latest Terraform version from HashiCorp API..."
            LATEST_VERSION=$(wget -qO- "https://api.releases.hashicorp.com/v1/releases/terraform/latest" | grep -o '"version":"[^"]*"' | cut -d'"' -f4)
            if [[ -z "$LATEST_VERSION" ]]; then
              echo "ERROR: Failed to fetch latest Terraform version from API"
              exit 2
            fi
            echo "Latest Terraform version: $LATEST_VERSION"
            TERRAFORM_URL="https://releases.hashicorp.com/terraform/${LATEST_VERSION}/terraform_${LATEST_VERSION}_linux_${TERRAFORM_ARCH}.zip"
          fi
          
          echo "Download URL: $TERRAFORM_URL"
          
          # Basic connectivity and environment info
          echo "Environment debug info:"
          echo "- Date: $(date)"
          echo "- PWD: $(pwd)"
          echo "- Available commands: $(which wget || echo 'no wget') $(which unzip || echo 'no unzip')"

          # Download and extract terraform using wget
          cd /tmp
          echo "Downloading terraform using wget..."
          wget "${TERRAFORM_URL}" -O terraform.zip || { echo "ERROR: Failed to download terraform"; exit 4; }
          
          echo "Extracting terraform using unzip..."
          unzip terraform.zip || { echo "ERROR: Failed to extract terraform"; exit 5; }
          
          echo "Installing terraform binary..."
          cp terraform "{{ .Values.dynamicrp.terraform.path }}/terraform" || { echo "ERROR: Failed to copy terraform"; exit 6; }
          chmod +x "{{ .Values.dynamicrp.terraform.path }}/terraform" || { echo "ERROR: Failed to make terraform executable"; exit 7; }
          
          # Create marker file to indicate pre-mounted binary is available
          echo "pre-mounted" > "{{ .Values.dynamicrp.terraform.path }}/.terraform-source"
          
          echo "Terraform binary successfully pre-downloaded and installed"
        volumeMounts:
        - name: terraform
          mountPath: {{ .Values.dynamicrp.terraform.path }}
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 65532
      {{- end }}
      containers:
      - name: dynamic-rp
        image: "{{ include "radius.image" (dict "image" .Values.dynamicrp.image "tag" (.Values.dynamicrp.tag | default .Values.global.imageTag | default $appversion) "global" .Values.global) }}"
        args:
        - --config-file=/etc/config/radius-self-host.yaml
        env:
        - name: SKIP_ARM
          value: 'false'
        - name: ARM_AUTH_METHOD
          value: 'UCPCredential'
        - name: RADIUS_ENV
          value: 'self-hosted'
        - name: K8S_CLUSTER
          value: 'true'
        {{- if .Values.dynamicrp.buildkit.enabled }}
        # Recipes use this to dial the buildkitd sidecar.
        - name: DOCKER_HOST
          value: "unix:///run/buildkit/buildkit.sock"
        # Make `pathexpand("~")` deterministic in the recipe runner so
        # the kreuzwerker/docker provider finds the mounted credentials.
        - name: HOME
          value: "/home/rpuser"
        {{- end }}
        {{- if .Values.global.rootCA.cert }}
        - name: {{ .Values.global.rootCA.sslCertDirEnvVar }}
          value: {{ .Values.global.rootCA.mountPath }}
        {{- end}}
        ports:
        - containerPort: 5443
          name: dynamic-rp
          protocol: TCP
        {{- if eq .Values.global.prometheus.enabled true }}
        - containerPort: {{ .Values.global.prometheus.port }}
          name: metrics
          protocol: TCP
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
        {{- if eq .Values.global.aws.irsa.enabled true }}
        - name: aws-iam-token
          mountPath: /var/run/secrets/eks.amazonaws.com/serviceaccount
        {{- end }}
        - name: terraform
          mountPath: {{ .Values.dynamicrp.terraform.path }}
        - name: encryption-secret
          mountPath: /var/secrets/encryption
          readOnly: true
        {{- if .Values.dynamicrp.buildkit.enabled }}
        # Shared with the buildkitd sidecar; holds the unix socket.
        - name: buildkit-run
          mountPath: /run/buildkit
        {{- if .Values.dynamicrp.buildkit.credentialsSecret }}
        # Docker config provides registry credentials to the recipe.
        - name: buildkit-credentials
          mountPath: /home/rpuser/.docker
          readOnly: true
        {{- end }}
        {{- end }}
        {{- if .Values.global.rootCA.cert }}
        - name: {{ .Values.global.rootCA.volumeName }}
          mountPath: {{ .Values.global.rootCA.mountPath }}
          readOnly: true
        {{- end }}
        {{- if .Values.global.appendRootCA.cert }}
        - name: ssl-certs
          mountPath: /etc/ssl/certs
          readOnly: true
        {{- end }}
        {{- if .Values.dynamicrp.resources }}
        resources:{{ toYaml .Values.rp.resources | nindent 10 }}
        {{- end }}
      {{- if .Values.dynamicrp.buildkit.enabled }}
      # Rootless BuildKit sidecar. Serves the unix socket that the
      # dynamic-rp recipe runner talks to via DOCKER_HOST. No host
      # paths, no privileged container, no extra capabilities.
      #
      # The sidecar runs as UID 1000 (the rootless image's default
      # `user` account); we pass `--group 65532` so the unix socket
      # is group-owned by the dynamic-rp container's GID, and the
      # Pod-level `fsGroup: 65532` ensures the shared emptyDir is
      # group-writable.
      - name: buildkitd
        image: "{{ .Values.dynamicrp.buildkit.image }}"
        args:
        - --addr
        - unix:///run/buildkit/buildkit.sock
        - --group
        - "65532"
        {{- if eq .Values.dynamicrp.buildkit.psaMode "baseline" }}
        - --oci-worker-no-process-sandbox
        {{- end }}
        readinessProbe:
          exec:
            command: ["buildctl", "debug", "workers"]
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["buildctl", "debug", "workers"]
          initialDelaySeconds: 30
          periodSeconds: 30
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          {{- if eq .Values.dynamicrp.buildkit.psaMode "baseline" }}
          # On clusters without user namespaces, BuildKit's rootless
          # mode needs unconfined seccomp/AppArmor to drop into the
          # nested user namespace. PSA `baseline` permits this; PSA
          # `restricted` does not.
          seccompProfile:
            type: Unconfined
          appArmorProfile:
            type: Unconfined
          {{- end }}
        volumeMounts:
        - name: buildkit-run
          mountPath: /run/buildkit
        - name: buildkit-state
          mountPath: /home/user/.local/share/buildkit
      {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: dynamic-rp-config
        {{- if eq .Values.global.aws.irsa.enabled true }}
        - name: aws-iam-token
          projected:
            sources:
            - serviceAccountToken:
                path: token
                expirationSeconds: 86400
                audience: "sts.amazonaws.com"
        {{- end }}
        - name: terraform
          emptyDir: {}
        - name: encryption-secret
          secret:
            secretName: radius-encryption-key
            defaultMode: 0400
        {{- if .Values.dynamicrp.buildkit.enabled }}
        - name: buildkit-run
          emptyDir: {}
        - name: buildkit-state
          emptyDir: {}
        {{- if .Values.dynamicrp.buildkit.credentialsSecret }}
        - name: buildkit-credentials
          secret:
            secretName: {{ .Values.dynamicrp.buildkit.credentialsSecret }}
            defaultMode: 0400
        {{- end }}
        {{- end }}
        {{- if .Values.global.rootCA.cert }}
        - name: {{ .Values.global.rootCA.volumeName }}
          secret:
            secretName: {{ .Values.global.rootCA.secretName }}
        {{- end }}
        {{- if .Values.global.appendRootCA.cert }}
        - name: ssl-certs
          emptyDir: {}
        {{- end }}
