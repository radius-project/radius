# defaults.yaml lists the resource types from resource-types-contrib that ship
# as defaults in Radius. Each entry uses the <namespace>/<typeName> format
# and is resolved to a file path in the resource-types-contrib repository
# using the convention: strip the "Radius." prefix, then
# <namespace>/<typeName>/<typeName>.yaml.
#
# Each namespace is pinned independently under `sources` to a commit SHA and
# fetched directly with git (no Go module). To update:
#   make update-resource-types                                  # all namespaces
#   make update-resource-types RESOURCE_TYPES_NAMESPACE=Radius.Compute
#
# To add a new default resource type:
#   1. Merge the manifest in resource-types-contrib.
#   2. Ensure its namespace has an entry under `sources` below.
#   3. Add the entry under `defaultRegistration` below.
#   4. Run: make update-resource-types
#   5. Commit the updated files (defaults.yaml and the copied YAMLs).

# sources pins, per namespace, the upstream resource-types-contrib revision the
# default manifests for that namespace are copied from. sync-resource-types
# fetches each distinct (repo, ref) once; update-resource-types resolves a
# branch/tag/commit to an immutable commit SHA and rewrites the matching ref.
# In Phase A every namespace tracks the same linear history, so the refs match;
# the per-namespace schema lets them diverge once upstream publishes
# per-namespace versioned artifacts (Phase B).
sources:
  - namespace: Radius.Compute
    repo: github.com/radius-project/resource-types-contrib
    # An immutable commit SHA (Phase A). A branch or tag is also accepted by the
    # fetch, but update-resource-types always pins a full commit SHA.
    ref: 158be1959352e2c23e22488ae7d26c772c989de1
  - namespace: Radius.Data
    repo: github.com/radius-project/resource-types-contrib
    ref: 158be1959352e2c23e22488ae7d26c772c989de1
  - namespace: Radius.Security
    repo: github.com/radius-project/resource-types-contrib
    ref: 158be1959352e2c23e22488ae7d26c772c989de1
  - namespace: Radius.Messaging
    repo: github.com/radius-project/resource-types-contrib
    ref: 158be1959352e2c23e22488ae7d26c772c989de1
  - namespace: Radius.AI
    repo: github.com/radius-project/resource-types-contrib
    ref: 158be1959352e2c23e22488ae7d26c772c989de1
  - namespace: Radius.Storage
    repo: github.com/radius-project/resource-types-contrib
    ref: 158be1959352e2c23e22488ae7d26c772c989de1
defaultRegistration:
  - Radius.Compute/containers
  - Radius.Compute/containerImages
  - Radius.Compute/persistentVolumes
  - Radius.Compute/routes
  - Radius.Security/secrets
  - Radius.Data/mySqlDatabases
  - Radius.Data/mongoDatabases
  - Radius.Data/postgreSqlDatabases
  - Radius.Data/redisCaches
  - Radius.Messaging/kafka
  - Radius.Messaging/rabbitMQ
  - Radius.AI/search
  - Radius.AI/models
  - Radius.Data/sqlServerDatabases
  - Radius.Storage/objectStorage
