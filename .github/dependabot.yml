# yaml-language-server: $schema=https://www.schemastore.org/dependabot-2.0.json
# See GitHub's documentation for more information on this file:
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference
---
version: 2

updates:
  - package-ecosystem: github-actions
    directories:
      - /
      - "/.github/actions/*"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directories:
      - /
      - /test/magpiego
      - /test/testrp
    schedule:
      interval: weekly
    groups:
      # Group k8s.io and controller-runtime together so they are always
      # bumped in the same PR. These packages share tight version coupling
      # and bumping k8s.io without a compatible controller-runtime release
      # will break the build (see controller-runtime replace in go.mod).
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/controller-runtime"
      go-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/controller-runtime"

  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directories:
      - /
      - /typespec
      - /hack/bicep-types-radius/src/autorest.bicep
      - /hack/bicep-types-radius/src/generator
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns:
          - "*"
