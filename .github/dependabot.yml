# yaml-language-server: $schema=https://www.schemastore.org/dependabot-2.0.json
# ------------------------------------------------------------------------------
# This file is synced from the radius-project/.github repository.
# DO NOT EDIT MANUALLY - changes will be overwritten by the next sync.
# Source: https://github.com/radius-project/.github
# Reference: https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference
# ------------------------------------------------------------------------------
---
version: 2


updates:
  - package-ecosystem: github-actions
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: gomod
    directories:
      - "/"
      - "/test/magpiego"
      - "/test/testrp"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore
      include: scope
    groups:
      go-deps:
        applies-to: version-updates
        patterns:
          - "*"
      security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "github.com/charmbracelet/x/exp/*"

  - package-ecosystem: npm
    directories:
      - "/"
      - "/typespec"
      - "/hack/bicep-types-radius/src/autorest.bicep"
      - "/hack/bicep-types-radius/src/generator"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore
      include: scope
    groups:
      javascript-deps:
        applies-to: version-updates
        patterns:
          - "*"
      security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: devcontainers
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore
      include: scope
    groups:
      devcontainers:
        applies-to: version-updates
        patterns:
          - "*"
      security:
        applies-to: security-updates
        patterns:
          - "*"
