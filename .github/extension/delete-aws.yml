# This workflow is auto-generated by Radius to delete a Radius application or
# environment from an AWS environment. It is a reusable (workflow_call) workflow
# invoked by the delete-application.yml / delete-environment.yml dispatchers; it is
# not dispatched directly. It creates an ephemeral k3d cluster for the Radius control
# plane, connects to the user's EKS cluster, restores persisted state, deletes the
# requested resource (running any recipe deletes against the target cluster), then
# persists the updated state again and tears the control plane down. The provider-
# agnostic phases are shared composite actions in radius-project/radius; only the
# AWS-specific steps live here.
name: Radius - Delete (AWS)

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub Environment name'
        type: string
        required: true
      resource_type:
        description: 'What to delete: application or environment'
        type: string
        required: true
      name:
        description: 'Name of the application or environment to delete'
        type: string
        required: true

permissions:
  id-token: write
  contents: write
  packages: write

env:
  ENVIRONMENT: ${{ inputs.environment }}

jobs:
  delete:
    name: Delete with Radius
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    # OCI-backed Radius control-plane state, provisioned per-environment by the
    # deploy tooling (canvas extension) as environment variables. Set at job
    # level (not workflow level) so environment-scoped vars.* resolve, and so the
    # shared restore-state (rad startup) and teardown (rad shutdown) actions —
    # plus the delete commands — inherit them and can open the state archive.
    # Without these, rad startup fails with "OCI archive repository is not
    # configured; set RADIUS_STATE_REGISTRY or RADIUS_GRAPH_REGISTRY".
    env:
      RADIUS_STATE_BACKEND: ${{ vars.RADIUS_STATE_BACKEND }}
      RADIUS_STATE_REGISTRY: ${{ vars.RADIUS_STATE_REGISTRY }}
      RADIUS_STATE_ARCHIVE: ${{ vars.RADIUS_STATE_ARCHIVE }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS Credentials (OIDC)
        if: ${{ vars.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to GHCR for the state archive
        # The OCI-backed Radius state archive authenticates to GHCR using the
        # runner's Docker credential store (~/.docker/config.json). rad startup
        # (restore-state) and rad shutdown (teardown) open that archive, so the
        # runner must be logged in BEFORE those steps run -- otherwise the pull
        # is anonymous and GHCR rejects the private radius-state package with a
        # 401. docker login persists for the whole job, covering teardown too.
        # GITHUB_TOKEN has packages: write (set at job level) for repo-linked
        # packages; a PAT can be supplied instead for other-owner packages.
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get target cluster kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "RADIUS_TARGET_KUBECONFIG=$HOME/.kube/target-cluster" >> "$GITHUB_ENV"

      - name: Connect to EKS cluster
        if: ${{ vars.AWS_EKS_CLUSTER_NAME != '' }}
        run: |
          CLUSTER="${{ vars.AWS_EKS_CLUSTER_NAME }}"
          REGION="${{ vars.AWS_REGION }}"
          ROLE_ARN="${{ vars.AWS_ROLE_ARN }}"
          TARGET="$RADIUS_TARGET_KUBECONFIG"

          # Ensure the IAM role has access to the EKS cluster. These calls are
          # idempotent by intent: a ResourceInUseException means the entry/policy is
          # already present, which is fine to ignore. Any other failure (auth,
          # permissions, throttling) is surfaced with its stderr and fails the step
          # rather than being masked behind an "already exists" message.
          echo "Ensuring EKS access entry for $ROLE_ARN..."
          if ! err=$(aws eks create-access-entry \
            --cluster-name "$CLUSTER" \
            --principal-arn "$ROLE_ARN" \
            --type STANDARD \
            --region "$REGION" 2>&1); then
            if printf '%s' "$err" | grep -q 'ResourceInUseException'; then
              echo "Access entry already exists"
            else
              printf '%s\n' "$err" >&2
              exit 1
            fi
          fi
          if ! err=$(aws eks associate-access-policy \
            --cluster-name "$CLUSTER" \
            --principal-arn "$ROLE_ARN" \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region "$REGION" 2>&1); then
            if printf '%s' "$err" | grep -q 'ResourceInUseException'; then
              echo "Access policy already associated"
            else
              printf '%s\n' "$err" >&2
              exit 1
            fi
          fi

          # Build a static kubeconfig with a bearer token instead of exec-based auth.
          ENDPOINT=$(aws eks describe-cluster --name "$CLUSTER" --region "$REGION" --query 'cluster.endpoint' --output text)
          CA_DATA=$(aws eks describe-cluster --name "$CLUSTER" --region "$REGION" --query 'cluster.certificateAuthority.data' --output text)
          TOKEN=$(aws eks get-token --cluster-name "$CLUSTER" --region "$REGION" --output json | jq -r '.status.token')
          printf 'apiVersion: v1\nclusters:\n- cluster:\n    certificate-authority-data: %s\n    server: %s\n  name: eks\ncontexts:\n- context:\n    cluster: eks\n    user: eks-user\n  name: eks\ncurrent-context: eks\nkind: Config\nusers:\n- name: eks-user\n  user:\n    token: %s\n' "$CA_DATA" "$ENDPOINT" "$TOKEN" > "$TARGET"
          echo "EKS kubeconfig saved with static token"
          kubectl --kubeconfig "$TARGET" cluster-info || echo "WARNING: Could not connect to EKS cluster"

      - name: Set up control plane
        uses: radius-project/radius/.github/extension/actions/setup-control-plane@{{RADIUS_REF}}

      - name: Project cloud OIDC tokens into Radius pods
        run: |
          # Mint GitHub OIDC tokens and mount them where Radius expects them, so the
          # recipe deletes triggered by the delete can authenticate to AWS exactly as
          # the deploy workflow does. GitHub Actions is already a trusted OIDC issuer
          # for AWS via the IAM role trust policy.
          if [ -n "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "Projecting AWS OIDC token..."
            AWS_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
            kubectl create secret generic aws-oidc-token -n radius-system \
              --from-literal=token="$AWS_TOKEN" --dry-run=client -o yaml | kubectl apply -f -

            # AWS IRSA: the UCP AWS proxy (ucp) and the Terraform AWS provider
            # (dynamic-rp) both read the token from the hard-coded path
            # /var/run/secrets/eks.amazonaws.com/serviceaccount/token.
            AWS_PATCH='[
              {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"aws-oidc-token","secret":{"secretName":"aws-oidc-token"}}},
              {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"aws-oidc-token","mountPath":"/var/run/secrets/eks.amazonaws.com/serviceaccount","readOnly":true}}
            ]'
            for deploy in applications-rp dynamic-rp ucp; do
              kubectl patch deployment $deploy -n radius-system --type=json -p="$AWS_PATCH" 2>/dev/null || true
            done
          fi

          for deploy in applications-rp dynamic-rp bicep-de ucp; do
            kubectl rollout status deployment/$deploy -n radius-system --timeout=300s || true
          done
          echo "✅ Cloud OIDC tokens projected into Radius pods."

      - name: Refresh external deployment target credentials
        run: |
          TARGET_KUBECONFIG="$RADIUS_TARGET_KUBECONFIG"

          if [ ! -f "$TARGET_KUBECONFIG" ]; then
            echo "No target kubeconfig found, resources are on the k3d control plane"
            exit 0
          fi

          # Refresh the EKS token right before delete (EKS tokens are short-lived and
          # the one minted earlier may have expired during install).
          if [ -n "${{ vars.AWS_ROLE_ARN }}" ] && [ -n "${{ vars.AWS_EKS_CLUSTER_NAME }}" ]; then
            echo "Generating fresh EKS token..."
            CLUSTER="${{ vars.AWS_EKS_CLUSTER_NAME }}"
            REGION="${{ vars.AWS_REGION }}"
            ENDPOINT=$(aws eks describe-cluster --name "$CLUSTER" --region "$REGION" --query 'cluster.endpoint' --output text)
            CA_DATA=$(aws eks describe-cluster --name "$CLUSTER" --region "$REGION" --query 'cluster.certificateAuthority.data' --output text)
            TOKEN=$(aws eks get-token --cluster-name "$CLUSTER" --region "$REGION" --output json | jq -r '.status.token')
            printf 'apiVersion: v1\nclusters:\n- cluster:\n    certificate-authority-data: %s\n    server: %s\n  name: eks\ncontexts:\n- context:\n    cluster: eks\n    user: eks-user\n  name: eks\ncurrent-context: eks\nkind: Config\nusers:\n- name: eks-user\n  user:\n    token: %s\n' "$CA_DATA" "$ENDPOINT" "$TOKEN" > "$TARGET_KUBECONFIG"
          fi

          # Update the secret the chart mounted at install with the refreshed
          # kubeconfig, then restart the recipe-executing pods so they re-read it.
          kubectl create secret generic target-kubeconfig --namespace radius-system \
            --from-file=kubeconfig="$TARGET_KUBECONFIG" --dry-run=client -o yaml | kubectl apply -f -
          for deploy in applications-rp dynamic-rp bicep-de; do
            kubectl rollout restart deployment/$deploy -n radius-system
          done

          echo "Waiting for rollouts..."
          kubectl rollout status deployment/applications-rp -n radius-system --timeout=300s
          kubectl rollout status deployment/dynamic-rp -n radius-system --timeout=300s
          kubectl rollout status deployment/bicep-de -n radius-system --timeout=300s
          echo "External deployment target configured."

      - name: Restore Radius state
        uses: radius-project/radius/.github/extension/actions/restore-state@{{RADIUS_REF}}
        with:
          namespace: ${{ vars.KUBERNETES_NAMESPACE || 'default' }}

      - name: Register cloud credentials with Radius
        run: |
          # Register the AWS identity so the recipe deletes can authenticate,
          # reading the projected OIDC token at runtime.
          if [ -n "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "Registering AWS IRSA credential..."
            rad credential register aws irsa --iam-role "${{ vars.AWS_ROLE_ARN }}"
          fi
          echo "✅ Cloud credentials registered with Radius."

      - name: Delete Radius resource
        uses: radius-project/radius/.github/extension/actions/delete-resource@{{RADIUS_REF}}
        with:
          resource-type: ${{ inputs.resource_type }}
          name: ${{ inputs.name }}

      - name: Teardown
        if: always()
        uses: radius-project/radius/.github/extension/actions/teardown@{{RADIUS_REF}}
