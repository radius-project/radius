# This workflow is auto-generated by Radius. It deletes a Radius environment: it
# detects whether the selected GitHub Environment is wired for Azure or AWS and
# calls the matching reusable delete workflow (delete-azure.yml / delete-aws.yml)
# with resource_type=environment. Deleting runs on an ephemeral k3d control plane
# that restores the persisted Radius state, runs `rad env delete`, and persists the
# updated state again. The Radius environment name defaults to the GitHub Environment
# name (the deploy workflow names the Radius environment after it), but can be
# overridden with the environment_name input.
name: Radius - Delete Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment name'
        required: true
        default: '{{ENV}}'
      environment_name:
        description: 'Radius environment name to delete (defaults to the GitHub Environment name)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: write
  packages: read

jobs:
  # Bind to the GitHub Environment so environment-scoped variables are visible, then
  # pick the provider from whichever identifying variable is set. A job that calls a
  # reusable workflow (`uses:`) can't bind an environment itself, so this routing
  # decision has to happen in a regular job first.
  detect:
    name: Detect provider
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || '{{ENV}}' }}
    outputs:
      provider: ${{ steps.detect.outputs.provider }}
    steps:
      - name: Determine provider from environment variables
        id: detect
        run: |
          if [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            echo "provider=azure" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "provider=aws" >> "$GITHUB_OUTPUT"
          else
            echo "No AZURE_CLIENT_ID or AWS_ROLE_ARN set on this environment." >&2
            echo "provider=none" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  azure:
    name: Azure
    needs: detect
    if: ${{ needs.detect.outputs.provider == 'azure' }}
    uses: ./.github/workflows/delete-azure.yml
    with:
      environment: ${{ inputs.environment || '{{ENV}}' }}
      resource_type: environment
      name: ${{ inputs.environment_name || inputs.environment || '{{ENV}}' }}
    secrets: inherit

  aws:
    name: AWS
    needs: detect
    if: ${{ needs.detect.outputs.provider == 'aws' }}
    uses: ./.github/workflows/delete-aws.yml
    with:
      environment: ${{ inputs.environment || '{{ENV}}' }}
      resource_type: environment
      name: ${{ inputs.environment_name || inputs.environment || '{{ENV}}' }}
    secrets: inherit
