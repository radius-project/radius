# This workflow is auto-generated by Radius. It is the unified entry point for
# running rad commands against an environment: it detects whether the selected
# GitHub Environment is wired for Azure or AWS and calls the matching reusable
# workflow (run-rad-commands-azure.yml / run-rad-commands-aws.yml). Keeping the
# dispatch contract (inputs, environment binding, verify→deploy auto-trigger) in
# one place lets the provider workflows stay thin and focused on cloud-specific
# steps. This is the run-rad-commands action in the two-action Repo Radius model
# (the other being verify-cloud-auth).
name: Radius - Run rad Commands

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment name'
        required: true
        default: '{{ENV}}'
      image:
        description: 'Container image for the application'
        required: false
        default: ''
      rad_commands:
        # The Repo Radius dispatch contract. A single rad CLI command string, or a
        # JSON-encoded array of command strings run in order, with the `rad` prefix
        # omitted (e.g. `deploy .radius/app.bicep --environment dev` or
        # `["deploy .radius/app.bicep --environment dev", "app graph my-app -o json"]`).
        # Commands run verbatim, so the caller must include any flags a command needs.
        # Each command is validated against the allowed-command set before anything
        # runs. When empty, the workflow runs its default `rad deploy` of the app file.
        description: 'rad CLI command string, or JSON array of command strings (rad prefix omitted, run verbatim). Overrides the default deploy.'
        required: false
        default: ''
  # Auto-trigger after the Verify Credentials workflow completes. The extension's
  # environment-setup flow dispatches only the verify workflow; this chain starts
  # the deploy once verify succeeds (the job-level `if` gates on the conclusion).
  workflow_run:
    workflows: ["Radius - Verify Credentials"]
    types: [completed]

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  # Bind to the GitHub Environment so environment-scoped variables are visible, then
  # pick the provider from whichever identifying variable is set. A job that calls a
  # reusable workflow (`uses:`) can't bind an environment itself, so this routing
  # decision has to happen in a regular job first.
  detect:
    name: Detect provider
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || '{{ENV}}' }}
    # On workflow_dispatch run unconditionally; on workflow_run only when the
    # upstream Verify Credentials run succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      provider: ${{ steps.detect.outputs.provider }}
    steps:
      - name: Determine provider from environment variables
        id: detect
        run: |
          if [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            echo "provider=azure" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "provider=aws" >> "$GITHUB_OUTPUT"
          else
            echo "No AZURE_CLIENT_ID or AWS_ROLE_ARN set on this environment." >&2
            echo "provider=none" >> "$GITHUB_OUTPUT"
          fi

  azure:
    name: Azure
    needs: detect
    if: ${{ needs.detect.outputs.provider == 'azure' }}
    uses: ./.github/workflows/run-rad-commands-azure.yml
    with:
      environment: ${{ inputs.environment || '{{ENV}}' }}
      image: ${{ inputs.image }}
      rad_commands: ${{ inputs.rad_commands }}
    secrets: inherit

  aws:
    name: AWS
    needs: detect
    if: ${{ needs.detect.outputs.provider == 'aws' }}
    uses: ./.github/workflows/run-rad-commands-aws.yml
    with:
      environment: ${{ inputs.environment || '{{ENV}}' }}
      image: ${{ inputs.image }}
      rad_commands: ${{ inputs.rad_commands }}
    secrets: inherit
