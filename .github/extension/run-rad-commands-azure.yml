# This workflow is auto-generated by Radius to run rad commands against an Azure
# environment. It is a reusable (workflow_call) workflow invoked by the unified
# run-rad-commands.yml dispatcher; it is not dispatched directly. It creates an
# ephemeral k3d cluster for the Radius control plane, connects to the user's AKS
# cluster, restores persisted state, runs the requested rad commands (deploying by
# default), then persists state again and tears the cluster down. The provider-
# agnostic phases are shared composite actions in radius-project/radius; only the
# Azure-specific steps live here. This is the run-rad-commands action in the
# two-action Repo Radius model (the other being verify-cloud-auth).
name: Radius - Run rad Commands (Azure)

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub Environment name'
        type: string
        required: true
      image:
        description: 'Container image for the application'
        type: string
        required: false
        default: ''
      rad_commands:
        description: 'rad CLI command string, or JSON array of command strings (rad prefix omitted; split on whitespace, so arguments with spaces are not supported). Overrides the default deploy.'
        type: string
        required: false
        default: ''

permissions:
  id-token: write
  contents: write
  packages: write

env:
  ENVIRONMENT: ${{ inputs.environment }}
  APP_FILE: '{{APP_FILE}}'
  APP_IMAGE: ${{ inputs.image || github.sha || 'latest' }}
  # Azure recipe pack from resource-types-contrib. Provisions data / messaging /
  # AI types with Azure Verified Modules (Bicep), builds the app image from repo
  # source via the Kubernetes containerImages recipe, and keeps core types
  # (containers, persistentVolumes, routes, secrets) on the shared Kubernetes
  # recipes. Tracks main; RECIPE_PACK_REF can be pinned to a commit if needed.
  RECIPE_PACK_REF: main
  RECIPE_PACK_PATH: recipepack/azure/aks-recipepack.bicep

jobs:
  deploy:
    name: Deploy with Radius
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    # OCI-backed Radius control-plane state, provisioned per-environment by the
    # deploy tooling (canvas extension) as environment variables. Set at job
    # level (not workflow level) so environment-scoped vars.* resolve, and so the
    # shared restore-state (rad startup) and teardown (rad shutdown) actions —
    # plus the deploy/app-graph commands — inherit them and can open the state
    # archive. Without these, rad startup fails with "OCI archive repository is
    # not configured; set RADIUS_STATE_REGISTRY or RADIUS_GRAPH_REGISTRY".
    env:
      RADIUS_STATE_BACKEND: ${{ vars.RADIUS_STATE_BACKEND }}
      RADIUS_STATE_REGISTRY: ${{ vars.RADIUS_STATE_REGISTRY }}
      RADIUS_STATE_ARCHIVE: ${{ vars.RADIUS_STATE_ARCHIVE }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Azure Login (OIDC)
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to GHCR for the state archive
        # The OCI-backed Radius state archive authenticates to GHCR using the
        # runner's Docker credential store (~/.docker/config.json). rad startup
        # (restore-state) and rad shutdown (teardown) open that archive, so the
        # runner must be logged in BEFORE those steps run -- otherwise the pull
        # is anonymous and GHCR rejects the private radius-state package with a
        # 401. docker login persists for the whole job, covering teardown too.
        # GITHUB_TOKEN has packages: write (set at job level) for repo-linked
        # packages; a PAT can be supplied instead for other-owner packages.
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get target cluster kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "RADIUS_TARGET_KUBECONFIG=$HOME/.kube/target-cluster" >> "$GITHUB_ENV"

      - name: Connect to AKS cluster
        if: ${{ vars.AZURE_AKS_CLUSTER_NAME != '' }}
        run: |
          az aks get-credentials \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_AKS_CLUSTER_NAME }}" \
            --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --file "$RADIUS_TARGET_KUBECONFIG"

      - name: Set up control plane
        uses: radius-project/radius/.github/extension/actions/setup-control-plane@{{RADIUS_REF}}

      - name: Project cloud OIDC tokens into Radius pods
        run: |
          # Mint GitHub OIDC tokens and mount them where Radius expects them.
          # GitHub Actions is already a trusted OIDC issuer for both AWS and Azure
          # (via the CloudFormation template / AAD federated credential), so no
          # custom issuer setup is needed.

          if [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            echo "Projecting Azure OIDC token..."
            AZ_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r '.value')
            # The secret data key becomes the mounted file name, so it must be
            # 'azure-identity-token' -- the file Radius and the Terraform azurerm
            # provider read from /var/run/secrets/azure/tokens/.
            kubectl create secret generic azure-oidc-token -n radius-system \
              --from-literal=azure-identity-token="$AZ_TOKEN" --dry-run=client -o yaml | kubectl apply -f -
          fi

          # Mount the projected token at the fixed paths Radius reads from. The
          # cloud identity selectors (AWS role ARN, Azure client/tenant id) are NOT
          # set as SDK-native env vars here -- they come from the UCP credential
          # registered later via `rad credential register`. We only project the raw
          # token file that the credential needs for the federated token exchange.

          # Azure workload identity: the Go UCPCredential (applications-rp), the
          # .NET Bicep DE (bicep-de) and the Terraform azurerm provider (dynamic-rp)
          # all read /var/run/secrets/azure/tokens/azure-identity-token.
          # AZURE_FEDERATED_TOKEN_FILE is still required because armauth builds the
          # WorkloadIdentityCredential with an empty TokenFilePath and falls back to
          # this env var to locate the token.
          if [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            AZ_PATCH='[
              {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"azure-oidc-token","secret":{"secretName":"azure-oidc-token"}}},
              {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"azure-oidc-token","mountPath":"/var/run/secrets/azure/tokens","readOnly":true}},
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"AZURE_FEDERATED_TOKEN_FILE","value":"/var/run/secrets/azure/tokens/azure-identity-token"}}
            ]'
            for deploy in applications-rp dynamic-rp bicep-de; do
              kubectl patch deployment $deploy -n radius-system --type=json -p="$AZ_PATCH" 2>/dev/null || true
            done
          fi

          # Wait for any patched deployments to roll out.
          for deploy in applications-rp dynamic-rp bicep-de ucp; do
            kubectl rollout status deployment/$deploy -n radius-system --timeout=300s || true
          done
          echo "✅ Cloud OIDC tokens projected into Radius pods."

      - name: Refresh external deployment target credentials
        run: |
          TARGET_KUBECONFIG="$RADIUS_TARGET_KUBECONFIG"

          if [ ! -f "$TARGET_KUBECONFIG" ]; then
            echo "No target kubeconfig found, resources will deploy to k3d cluster"
            exit 0
          fi

          # Update the secret the chart mounted at install with the refreshed
          # kubeconfig, then restart the recipe-executing pods so they re-read it.
          # The chart owns the volume mount and RADIUS_TARGET_KUBECONFIG env var via
          # global.targetCluster.enabled, so no manual deployment patching is needed.
          # All three pods honor RADIUS_TARGET_KUBECONFIG natively: applications-rp
          # (direct-rendered resources) and dynamic-rp (Terraform kubernetes provider)
          # via the cluster access resolver, and bicep-de (Bicep 'extension kubernetes'
          # provider). The Terraform state backend deliberately stays on the
          # control-plane cluster, so no backend override is needed here.
          kubectl create secret generic target-kubeconfig --namespace radius-system \
            --from-file=kubeconfig="$TARGET_KUBECONFIG" --dry-run=client -o yaml | kubectl apply -f -
          for deploy in applications-rp dynamic-rp bicep-de; do
            kubectl rollout restart deployment/$deploy -n radius-system
          done

          echo "Waiting for rollouts..."
          kubectl rollout status deployment/applications-rp -n radius-system --timeout=300s
          kubectl rollout status deployment/dynamic-rp -n radius-system --timeout=300s
          kubectl rollout status deployment/bicep-de -n radius-system --timeout=300s
          echo "External deployment target configured."

      - name: Restore Radius state
        uses: radius-project/radius/.github/extension/actions/restore-state@{{RADIUS_REF}}
        with:
          namespace: ${{ vars.KUBERNETES_NAMESPACE || 'default' }}

      - name: Register cloud credentials with Radius
        run: |
          # Register the cloud identity with Radius using its UCP credential model.
          # Radius stores only the identity selector (AWS role ARN / Azure client +
          # tenant id); the short-lived token is read at runtime from the GitHub
          # OIDC token file projected into the pods in the earlier step. This keeps
          # the credential visible to `rad credential show`, rotatable, and usable
          # by both the Bicep and Terraform code paths.
          if [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            echo "Registering Azure workload identity credential..."
            rad credential register azure wi \
              --client-id "${{ vars.AZURE_CLIENT_ID }}" \
              --tenant-id "${{ vars.AZURE_TENANT_ID }}"
          fi
          echo "✅ Cloud credentials registered with Radius."

      - name: Create Radius environment and recipe pack
        run: |
          NAMESPACE="${{ vars.KUBERNETES_NAMESPACE || 'default' }}"

          # Registry and credentials for the Radius.Compute/containerImages recipe.
          # The recipe builds images with the in-pod BuildKit and pushes them to
          # $BUILD_REGISTRY, authenticating with the Kubernetes Secret named
          # $REGISTRY_SECRET_NAME. That Secret is created on the target cluster by
          # the app's Radius.Security/secrets resource during `rad deploy` (fed by
          # the registryUsername/registryPassword parameters injected by the
          # run-rad-commands action). Only the secret NAME is wired here via the
          # recipe pack's containerImagesRegistrySecretName. $BUILD_REGISTRY is
          # ghcr.io/<owner>/<repo> so images land under the repository's package
          # namespace; it must be lowercase.
          BUILD_REGISTRY=$(echo "${{ vars.RADIUS_BUILD_REGISTRY || format('ghcr.io/{0}', github.repository) }}" | tr '[:upper:]' '[:lower:]')
          REGISTRY_SECRET_NAME="ghcr-registry-creds"

          # Download the default Azure recipe pack from resource-types-contrib,
          # pinned to $RECIPE_PACK_REF. The recipe logic lives upstream; here we
          # only supply parameters. The pack creates a Radius.Core/recipePacks
          # resource and a Radius.Core/environments resource referencing it.
          RECIPE_PACK_URL="https://raw.githubusercontent.com/radius-project/resource-types-contrib/${{ env.RECIPE_PACK_REF }}/${{ env.RECIPE_PACK_PATH }}"
          echo "Downloading recipe pack from $RECIPE_PACK_URL"
          # Place the recipe pack next to the app file so `rad deploy` resolves the
          # repo's own bicepconfig.json (which declares the `radius` extension). bicep
          # resolves the config nearest the .bicep file, so writing it to $APP_DIR
          # (e.g. .radius/) picks up .radius/bicepconfig.json instead of the workspace
          # root, where no config exists.
          APP_DIR=$(dirname "$APP_FILE")
          ENV_BICEP="$APP_DIR/radius-env.bicep"
          curl -fsSL "$RECIPE_PACK_URL" -o "$ENV_BICEP"

          # routesGatewayName is a required pack parameter, but it only matters when
          # a Radius.Compute/routes resource is actually deployed. Default to empty
          # unless the repo configures an existing Kubernetes Gateway.
          ROUTES_GATEWAY_NAME="${{ vars.RADIUS_ROUTES_GATEWAY_NAME }}"
          ROUTES_GATEWAY_NAMESPACE="${{ vars.RADIUS_ROUTES_GATEWAY_NAMESPACE || 'default' }}"

          echo "Recipe pack file:"
          cat "$ENV_BICEP"
          echo ""
          echo "Deploying Radius.Core/environments and recipe pack..."
          rad deploy "$ENV_BICEP" \
            --parameters environmentName="$ENVIRONMENT" \
            --parameters environmentNamespace="$NAMESPACE" \
            --parameters azureSubscriptionId="${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --parameters azureResourceGroup="${{ vars.AZURE_RESOURCE_GROUP }}" \
            --parameters routesGatewayName="$ROUTES_GATEWAY_NAME" \
            --parameters routesGatewayNamespace="$ROUTES_GATEWAY_NAMESPACE" \
            --parameters containerImagesRegistry="$BUILD_REGISTRY" \
            --parameters containerImagesRegistrySecretName="$REGISTRY_SECRET_NAME"
          echo "✅ Environment '$ENVIRONMENT' created with recipe pack."

      - name: Run rad commands
        uses: radius-project/radius/.github/extension/actions/run-rad-commands@{{RADIUS_REF}}
        with:
          environment: ${{ inputs.environment }}
          app-file: ${{ env.APP_FILE }}
          app-image: ${{ env.APP_IMAGE }}
          namespace: ${{ vars.KUBERNETES_NAMESPACE || 'default' }}
          rad-commands: ${{ inputs.rad_commands || vars.RADIUS_RAD_COMMANDS }}
          deploy-params: ${{ secrets.RADIUS_DEPLOY_PARAMS }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Teardown
        if: always()
        uses: radius-project/radius/.github/extension/actions/teardown@{{RADIUS_REF}}
