# Provider-agnostic deploy shared by run-rad-commands-aws.yml and
# run-rad-commands-azure.yml. Runs the requested rad commands (deploying by
# default), writing the combined rad-commands-result artifact. Teardown (rad
# shutdown, log collection, k3d delete) lives in the separate `teardown` action
# so it can run unconditionally.
name: Radius - Run rad commands
description: Run the requested rad commands (deploying by default).

inputs:
  environment:
    description: Radius environment name.
    required: true
  app-file:
    description: Application bicep file to deploy by default.
    required: true
  app-image:
    description: Container image passed to the default deploy as the image parameter.
    required: false
    default: ""
  namespace:
    description: Target Kubernetes namespace (vars.KUBERNETES_NAMESPACE, defaults to default).
    required: false
    default: default
  rad-commands:
    description: rad command string or JSON array (rad prefix omitted). Overrides the default deploy.
    required: false
    default: ""
  deploy-params:
    description: Application parameters as a JSON object, expanded into --parameters name=value pairs.
    required: false
    default: ""
  registry-username:
    description: Username passed to the app deploy as the registryUsername parameter (feeds the app's Radius.Security/secrets registry Secret).
    required: true
  registry-password:
    description: Password/token passed to the app deploy as the registryPassword parameter (feeds the app's Radius.Security/secrets registry Secret).
    required: true

runs:
  using: composite
  steps:
    - name: Verify app namespace on target cluster
      shell: bash
      run: |
        TARGET_KUBECONFIG="$RADIUS_TARGET_KUBECONFIG"
        if [ -f "$TARGET_KUBECONFIG" ]; then
          BICEP_APP_NAME=$(grep -oP "name:\s*'\K[^']+" ".radius/app.bicep" 2>/dev/null | head -1)
          if [ -z "$BICEP_APP_NAME" ]; then
            BICEP_APP_NAME="app"
          fi
          APP_NS="default-$BICEP_APP_NAME"
          echo "Ensuring namespace $APP_NS exists on target cluster..."
          kubectl --kubeconfig "$TARGET_KUBECONFIG" get namespace "$APP_NS" 2>/dev/null || \
            kubectl --kubeconfig "$TARGET_KUBECONFIG" create namespace "$APP_NS"
        fi

    - name: Run rad commands
      shell: bash
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        APP_FILE: ${{ inputs.app-file }}
        APP_IMAGE: ${{ inputs.app-image }}
        # Registry push/pull credentials for the app deploy. These are passed to
        # the app file's `rad deploy` as the registryUsername/registryPassword
        # parameters, which feed the app's Radius.Security/secrets resource
        # (`radius-ghcr-registry-creds`). That resource materializes the registry Secret
        # on the TARGET cluster, where the containerImages recipe reads it by the
        # name the recipe pack registers. Read via the environment (not inlined
        # into the script) so the secret value can't break the shell or be
        # word-split, and is never written into the recorded command string.
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_PASSWORD: ${{ inputs.registry-password }}
        # Pass caller input through the environment to avoid command injection.
        # Caller-supplied rad commands (falls back to the RADIUS_RAD_COMMANDS
        # variable upstream) so the command applies on both an explicit dispatch
        # and the verify→deploy auto trigger (where inputs are empty).
        RAD_COMMANDS: ${{ inputs.rad-commands }}
        # Application parameters (user-supplied + auto-generated by the Radius
        # extension) as a JSON object: {"password":"…","apiKey":"…"}. Consumed
        # by the default deploy below. Read via the environment (not inlined into
        # the script) so values with quotes/newlines can't break the shell.
        RADIUS_DEPLOY_PARAMS: ${{ inputs.deploy-params }}
      run: |
        # pipefail so a failed `rad` whose output is piped through `tee` is detected
        # via PIPESTATUS rather than masked by tee's exit code.
        set -o pipefail
        mkdir -p /tmp/radius-output
        RESULT_FILE=/tmp/radius-output/rad-commands-result.json

        # Aggregate result accumulators. The result is written by a trap on EXIT so
        # the combined `rad-commands-result` artifact is complete even when a command
        # fails and the step exits early.
        COMMANDS_JSON='[]'
        OVERALL_OUTCOME="succeeded"
        OVERALL_EXIT=0
        REQUESTED=0
        RAN=0

        write_result() {
          jq -n \
            --arg outcome "$OVERALL_OUTCOME" \
            --argjson exitCode "$OVERALL_EXIT" \
            --arg environment "$ENVIRONMENT" \
            --argjson requested "$REQUESTED" \
            --argjson ran "$RAN" \
            --argjson commands "$COMMANDS_JSON" \
            '{schemaVersion:"1.0", outcome:$outcome, exitCode:$exitCode, environment:$environment, commandsRequested:$requested, commandsRan:$ran, commands:$commands}' \
            > "$RESULT_FILE"
        }
        trap write_result EXIT

        # Allowed-command set. Each command's leading verb must be in this list, so
        # commands that do not fit the ephemeral, per-run model — managing or
        # upgrading a control plane, switching workspaces, or changing install state —
        # cannot run. Validation happens before any command runs, so a disallowed
        # command fails fast (exit 2) without deploying anything.
        ALLOWED_VERBS="deploy app resource env recipe group credential resource-type version bicep"
        is_allowed() {
          local verb="${1%% *}"
          case " $ALLOWED_VERBS " in *" $verb "*) return 0 ;; *) return 1 ;; esac
        }

        # Record one command's result into the combined artifact. Keeps live console
        # output via tee while capturing it for the artifact.
        record() {
          local index="$1"; shift
          local display="$1"; shift
          local outfile code gtitle
          # The recorded command string can contain a caller-supplied secret (e.g.
          # a value passed inline via `--parameters`). GitHub's log masking does not
          # apply to artifact contents, so strip every known secret from `display`
          # before it reaches either the ::group:: title or the JSON `command` field.
          display=$(scrub_string "$display")
          outfile=$(mktemp)
          # The group title carries the caller-supplied command string, so escape
          # the workflow-command metacharacters: strip CR, fold newlines to spaces
          # (a title is single-line), and escape '%' -- the escape char -- so the
          # value can neither break the ::group:: command nor inject into the log.
          gtitle="rad $display"
          gtitle=${gtitle//$'\r'/}
          gtitle=${gtitle//$'\n'/ }
          gtitle=${gtitle//'%'/'%25'}
          echo "::group::$gtitle"
          "$@" 2>&1 | tee "$outfile"
          code=${PIPESTATUS[0]}
          echo "::endgroup::"
          RAN=$((RAN + 1))
          # Redact any known secret values from the captured output before it is
          # written into the uploaded artifact. GitHub's log masking does not apply
          # to artifact file contents, so scrub them ourselves.
          scrub_secrets "$outfile"
          COMMANDS_JSON=$(jq \
            --argjson index "$index" \
            --arg cmd "$display" \
            --argjson code "$code" \
            --arg outcome "$([ "$code" -eq 0 ] && echo succeeded || echo failed)" \
            --rawfile out "$outfile" \
            '. + [{index:$index, command:$cmd, outcome:$outcome, exitCode:$code, output:$out}]' \
            <<<"$COMMANDS_JSON")
          rm -f "$outfile"
          return "$code"
        }

        # True when RADIUS_DEPLOY_PARAMS (a JSON object) already carries the given
        # key with a usable value. Used to avoid passing a --parameters twice when
        # an older environment still supplies registryUsername/registryPassword in
        # the params secret. A key whose value is null or an empty string is treated
        # as absent, so the runner-provided credentials are still injected.
        deploy_params_has_key() {
          [ -n "$DEPLOY_PARAMS_JSON" ] || return 1
          printf '%s' "$DEPLOY_PARAMS_JSON" | jq -e --arg k "$1" 'has($k) and (.[$k] != null) and (.[$k] != "")' >/dev/null 2>&1
        }

        # Secret values that must never reach the logs or the uploaded artifact:
        # the registry password (the runner GITHUB_TOKEN) and every value in the
        # RADIUS_DEPLOY_PARAMS secret. Register each with ::add-mask:: so GitHub
        # redacts it from the live logs (defense in depth -- registered secrets are
        # already masked, but values sourced from vars are not), and keep the list
        # for scrub_secrets to strip from the captured output.
        SECRET_VALUES=()
        add_secret() {
          [ -n "$1" ] || return 0
          SECRET_VALUES+=("$1")
          # Mask one line at a time. GitHub reliably masks a single-line value, but
          # a multiline ::add-mask:: leaves the second and later lines unmasked (and
          # prints them verbatim). Strip CR and escape '%' -- the workflow-command
          # escape character -- so a value can neither break nor inject the command,
          # then emit a mask for each non-empty line.
          local _line
          while IFS= read -r _line || [ -n "$_line" ]; do
            _line=${_line//$'\r'/}
            [ -n "$_line" ] || continue
            _line=${_line//'%'/'%25'}
            echo "::add-mask::$_line"
          done <<< "$1"
        }

        # RADIUS_DEPLOY_PARAMS is a secret expected to be a JSON object. Validate it
        # once, up front, so the jq calls below never emit a parse error -- which
        # could echo raw secret content into the logs -- when the value is malformed.
        # A blank/unset value means "no params"; a malformed value is rejected with a
        # generic message (no secret content) and treated as empty.
        DEPLOY_PARAMS_JSON=""
        if [ -n "${RADIUS_DEPLOY_PARAMS//[[:space:]]/}" ]; then
          if printf '%s' "$RADIUS_DEPLOY_PARAMS" | jq -e 'type == "object"' >/dev/null 2>&1; then
            DEPLOY_PARAMS_JSON="$RADIUS_DEPLOY_PARAMS"
          else
            echo "::error::RADIUS_DEPLOY_PARAMS is not a valid JSON object; ignoring it." >&2
          fi
        fi

        add_secret "$REGISTRY_PASSWORD"
        if [ -n "$DEPLOY_PARAMS_JSON" ]; then
          while IFS= read -r _sname; do
            [ -z "$_sname" ] && continue
            # Emit nothing for a JSON null so add_secret is not asked to mask/scrub
            # the literal string "null" (which would redact unrelated output).
            add_secret "$(printf '%s' "$DEPLOY_PARAMS_JSON" | jq -r --arg k "$_sname" 'if .[$k] == null then empty else .[$k] end' 2>/dev/null)"
          done < <(printf '%s' "$DEPLOY_PARAMS_JSON" | jq -r 'keys_unsorted[]' 2>/dev/null)
        fi

        # Strip every known secret value from a string, replacing each with ***. The
        # search value is double-quoted inside the substitution, which disables
        # pattern matching so it is compared as a literal string -- glob
        # metacharacters (* ? [ ] \) in a secret are matched verbatim, not as
        # patterns.
        scrub_string() {
          local s="$1" value
          for value in "${SECRET_VALUES[@]}"; do
            [ -n "$value" ] || continue
            s=${s//"$value"/***}
          done
          printf '%s' "$s"
        }

        # Replace every known secret value in the given file with *** in place, so
        # the artifact never carries a credential that `rad` happened to echo.
        scrub_secrets() {
          local file="$1"
          [ ${#SECRET_VALUES[@]} -eq 0 ] && return 0
          printf '%s' "$(scrub_string "$(cat "$file")")" > "$file"
        }

        if [ -n "${RAD_COMMANDS//[[:space:]]/}" ]; then
          # Caller-supplied commands: a single command string or a JSON array, run in
          # order with the `rad` prefix omitted.
          if printf '%s' "$RAD_COMMANDS" | jq -e 'type == "array"' >/dev/null 2>&1; then
            mapfile -t COMMANDS < <(printf '%s' "$RAD_COMMANDS" | jq -r '.[]')
          else
            COMMANDS=("$RAD_COMMANDS")
          fi

          # Drop blank entries and validate every command before running any of them.
          CLEAN=()
          for cmd in "${COMMANDS[@]}"; do
            [ -z "${cmd//[[:space:]]/}" ] && continue
            CLEAN+=("$cmd")
          done
          REQUESTED=${#CLEAN[@]}

          for cmd in "${CLEAN[@]}"; do
            if ! is_allowed "$cmd"; then
              OVERALL_OUTCOME="disallowed_command"
              OVERALL_EXIT=2
              COMMANDS_JSON=$(jq --arg cmd "$cmd" \
                '. + [{command:$cmd, outcome:"disallowed", exitCode:2, errorMessage:"Command leading verb is not in the allowed-command set."}]' \
                <<<"$COMMANDS_JSON")
              echo "Disallowed command: rad $cmd" >&2
              exit 2
            fi
          done

          idx=0
          for cmd in "${CLEAN[@]}"; do
            verb="${cmd%% *}"
            if [ "$verb" = "deploy" ]; then
              # For deploy commands, build an argv array so secret values with
              # special characters are never word-split, and keep them out of the
              # recorded command string (only the non-secret `$cmd` is recorded).
              # shellcheck disable=SC2086
              read -ra CMD_ARGV <<< "$cmd"
              EXTRA_PARAMS=()
              # The image, application, and registry parameters belong to the app
              # only. `rad deploy` rejects unknown parameters, so a custom command
              # that deploys a different template (e.g. an environment/recipe-pack
              # bicep) must not receive them. Find the deploy target -- the first
              # positional argument after the `deploy` verb -- skipping flags and
              # the values of value-taking flags, since rad accepts flags before
              # the file (e.g. `deploy -e dev app.bicep`). Inject the app-only
              # parameters only when the target is APP_FILE.
              DEPLOY_TARGET=""
              _val_flags=" -w --workspace -g --group -a --application -e --environment -p --parameters "
              _i=1
              while [ "$_i" -lt "${#CMD_ARGV[@]}" ]; do
                _tok="${CMD_ARGV[$_i]}"
                case "$_tok" in
                  -*=*)
                    _i=$((_i + 1)) ;;
                  -*)
                    case "$_val_flags" in
                      *" $_tok "*) _i=$((_i + 2)) ;;
                      *) _i=$((_i + 1)) ;;
                    esac ;;
                  *)
                    DEPLOY_TARGET="$_tok"; break ;;
                esac
              done
              if [ "$DEPLOY_TARGET" = "$APP_FILE" ]; then
                if [ -n "$APP_IMAGE" ]; then
                  EXTRA_PARAMS+=(--parameters "image=$APP_IMAGE")
                fi
                if [ -n "$DEPLOY_PARAMS_JSON" ]; then
                  while IFS= read -r _pname; do
                    [ -z "$_pname" ] && continue
                    _pval=$(printf '%s' "$DEPLOY_PARAMS_JSON" | jq -r --arg k "$_pname" '.[$k]' 2>/dev/null)
                    EXTRA_PARAMS+=(--parameters "$_pname=$_pval")
                  done < <(printf '%s' "$DEPLOY_PARAMS_JSON" | jq -r 'keys_unsorted[]' 2>/dev/null)
                fi
                # Registry credentials for the app's Radius.Security/secrets
                # resource. Appended to the argv array so the secret value is never
                # word-split or written into the recorded command string. Skipped
                # when the params secret already supplies the key, so the same
                # --parameters is never passed twice.
                if [ -n "$REGISTRY_USERNAME" ] && ! deploy_params_has_key registryUsername; then
                  EXTRA_PARAMS+=(--parameters "registryUsername=$REGISTRY_USERNAME")
                fi
                if [ -n "$REGISTRY_PASSWORD" ] && ! deploy_params_has_key registryPassword; then
                  EXTRA_PARAMS+=(--parameters "registryPassword=$REGISTRY_PASSWORD")
                fi
              fi
              if ! record "$idx" "$cmd" rad "${CMD_ARGV[@]}" "${EXTRA_PARAMS[@]}"; then
                OVERALL_OUTCOME="command_failed"
                OVERALL_EXIT=1
                echo "Command failed: rad $cmd" >&2
                exit 1
              fi
            else
              # Intentional word-split: the command string carries its own args.
              # shellcheck disable=SC2086
              if ! record "$idx" "$cmd" rad $cmd; then
                OVERALL_OUTCOME="command_failed"
                OVERALL_EXIT=1
                echo "Command failed: rad $cmd" >&2
                exit 1
              fi
            fi
            idx=$((idx + 1))
          done
          echo "✅ Radius commands complete."
        else
          # Default behavior: deploy the app bicep. Build the parameters as an array
          # so values with special characters are not mangled by the shell.
          REQUESTED=1
          DEPLOY_PARAMS=()
          if [ -n "$APP_IMAGE" ]; then
            DEPLOY_PARAMS+=(--parameters "image=$APP_IMAGE")
          fi
          # Expand the application parameters JSON ({"name":"value", …}) into
          # --parameters name=value pairs. Each value is read back from the JSON
          # by key with jq so embedded '=', spaces, or newlines are preserved and
          # never re-split by the shell.
          if [ -n "$DEPLOY_PARAMS_JSON" ]; then
            while IFS= read -r _pname; do
              [ -z "$_pname" ] && continue
              _pval=$(printf '%s' "$DEPLOY_PARAMS_JSON" | jq -r --arg k "$_pname" '.[$k]' 2>/dev/null)
              DEPLOY_PARAMS+=(--parameters "$_pname=$_pval")
            done < <(printf '%s' "$DEPLOY_PARAMS_JSON" | jq -r 'keys_unsorted[]' 2>/dev/null)
          fi
          # Registry credentials for the app's Radius.Security/secrets resource
          # (`radius-ghcr-registry-creds`). Appended to the argv array so the secret
          # value is never word-split or written into the recorded command string.
          # Skipped when the params secret already supplies the key, so the same
          # --parameters is never passed twice.
          if [ -n "$REGISTRY_USERNAME" ] && ! deploy_params_has_key registryUsername; then
            DEPLOY_PARAMS+=(--parameters "registryUsername=$REGISTRY_USERNAME")
          fi
          if [ -n "$REGISTRY_PASSWORD" ] && ! deploy_params_has_key registryPassword; then
            DEPLOY_PARAMS+=(--parameters "registryPassword=$REGISTRY_PASSWORD")
          fi
          # The recorded command string omits the parameters so secret values are
          # not written into the result artifact.
          if ! record 0 "deploy $APP_FILE --environment $ENVIRONMENT" \
              rad deploy "$APP_FILE" --environment "$ENVIRONMENT" "${DEPLOY_PARAMS[@]}"; then
            OVERALL_OUTCOME="command_failed"
            OVERALL_EXIT=1
            echo "Deployment failed" >&2
            exit 1
          fi
          echo "✅ Deployment complete."
        fi

    - name: Upload command result
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: rad-commands-result
        path: /tmp/radius-output/
        retention-days: 1
