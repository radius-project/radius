# Provider-agnostic deploy shared by run-rad-commands-aws.yml and
# run-rad-commands-azure.yml. Provisions registry credentials on the control plane
# and runs the requested rad commands (deploying by default), writing the combined
# rad-commands-result artifact. Teardown (rad shutdown, log collection, k3d delete)
# lives in the separate `teardown` action so it can run unconditionally.
name: Radius - Run rad commands
description: Provision registry credentials and run the requested rad commands (deploying by default).

inputs:
  environment:
    description: Radius environment name.
    required: true
  app-file:
    description: Application bicep file to deploy by default.
    required: true
  app-image:
    description: Container image passed to the default deploy as the image parameter.
    required: false
    default: ""
  namespace:
    description: Target Kubernetes namespace (vars.KUBERNETES_NAMESPACE, defaults to default).
    required: false
    default: default
  rad-commands:
    description: rad command string or JSON array (rad prefix omitted). Overrides the default deploy.
    required: false
    default: ""
  deploy-params:
    description: Application parameters as a JSON object, expanded into --parameters name=value pairs.
    required: false
    default: ""
  registry-username:
    description: Username for the containerImages recipe's image-push registry secret.
    required: true
  registry-password:
    description: Password/token for the containerImages recipe's image-push registry secret.
    required: true

runs:
  using: composite
  steps:
    - name: Verify app namespace on target cluster
      shell: bash
      run: |
        TARGET_KUBECONFIG="$RADIUS_TARGET_KUBECONFIG"
        if [ -f "$TARGET_KUBECONFIG" ]; then
          BICEP_APP_NAME=$(grep -oP "name:\s*'\K[^']+" ".radius/app.bicep" 2>/dev/null | head -1)
          if [ -z "$BICEP_APP_NAME" ]; then
            BICEP_APP_NAME="app"
          fi
          APP_NS="default-$BICEP_APP_NAME"
          echo "Ensuring namespace $APP_NS exists on target cluster..."
          kubectl --kubeconfig "$TARGET_KUBECONFIG" get namespace "$APP_NS" 2>/dev/null || \
            kubectl --kubeconfig "$TARGET_KUBECONFIG" create namespace "$APP_NS"
        fi

    - name: Provision registry credentials on control plane
      shell: bash
      env:
        # The Radius.Compute/containerImages recipe authenticates its BuildKit
        # image push by loading the Kubernetes Secret named by registrySecretName
        # via the in-cluster provider -- i.e. from the CONTROL PLANE cluster where
        # the dynamic-rp/BuildKit pods run, NOT the target cluster. Provision that
        # secret here directly from the default GitHub token so no registry
        # credentials need to live in the application bicep.
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_PASSWORD: ${{ inputs.registry-password }}
        ENV_NS: ${{ inputs.namespace }}
      run: |
        set -eu
        REGISTRY_SECRET_NAME="ghcr-registry-creds"
        BICEP_APP_NAME=$(grep -oP "name:\s*'\K[^']+" ".radius/app.bicep" 2>/dev/null | head -1)
        [ -z "$BICEP_APP_NAME" ] && BICEP_APP_NAME="app"
        APP_NS="default-$BICEP_APP_NAME"
        # The recipe reads the secret from context.runtime.kubernetes.namespace on
        # the control plane. Materialize it in both the environment namespace and
        # the application namespace so the read resolves regardless of scope. These
        # kubectl calls run against the default kubeconfig (the control plane), not
        # the target cluster.
        for NS in "$ENV_NS" "$APP_NS"; do
          kubectl get namespace "$NS" >/dev/null 2>&1 || kubectl create namespace "$NS"
          kubectl create secret generic "$REGISTRY_SECRET_NAME" \
            --namespace "$NS" \
            --from-literal=username="$REGISTRY_USERNAME" \
            --from-literal=password="$REGISTRY_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Provisioned $REGISTRY_SECRET_NAME in control-plane namespace $NS"
        done

    - name: Run rad commands
      shell: bash
      env:
        ENVIRONMENT: ${{ inputs.environment }}
        APP_FILE: ${{ inputs.app-file }}
        APP_IMAGE: ${{ inputs.app-image }}
        # Pass caller input through the environment to avoid command injection.
        # Caller-supplied rad commands (falls back to the RADIUS_RAD_COMMANDS
        # variable upstream) so the command applies on both an explicit dispatch
        # and the verify→deploy auto trigger (where inputs are empty).
        RAD_COMMANDS: ${{ inputs.rad-commands }}
        # Application parameters (user-supplied + auto-generated by the Radius
        # extension) as a JSON object: {"password":"…","apiKey":"…"}. Consumed
        # by the default deploy below. Read via the environment (not inlined into
        # the script) so values with quotes/newlines can't break the shell.
        RADIUS_DEPLOY_PARAMS: ${{ inputs.deploy-params }}
      run: |
        # pipefail so a failed `rad` whose output is piped through `tee` is detected
        # via PIPESTATUS rather than masked by tee's exit code.
        set -o pipefail
        mkdir -p /tmp/radius-output
        RESULT_FILE=/tmp/radius-output/rad-commands-result.json

        # Ensure the radiusCompute extension is imported for Radius.Compute/containerImages.
        # Without it, the Bicep compiler routes Radius.Compute types to Azure ARM instead of UCP.
        if ! grep -q 'extension radiusCompute' "$APP_FILE" 2>/dev/null; then
          echo "Injecting 'extension radiusCompute' into $APP_FILE"
          sed -i '/^extension radius$/a extension radiusCompute' "$APP_FILE" 2>/dev/null || true
        fi

        # Ensure the repo's own bicepconfig.json (next to the app file) declares the
        # containerImages Bicep extension so `rad deploy` can resolve
        # Radius.Compute/containerImages. bicep resolves the config nearest the .bicep
        # file, so we update the one beside $APP_FILE. The radiuscompute.tgz tarball is
        # built at the workspace root by the register-resource-types action; the alias
        # path is therefore relative to the bicepconfig's own directory. We edit the
        # working copy ONLY — nothing is committed back to the repo. An existing config
        # is merged in place (adding only radiusCompute + the extensibility flag when
        # missing, never clobbering the user's other settings); a missing one is created.
        APP_DIR=$(dirname "$APP_FILE")
        BICEPCONFIG="$APP_DIR/bicepconfig.json"
        TGZ_REF=$(python3 -c "import os,sys; r=os.path.relpath('radiuscompute.tgz', sys.argv[1]); print(r if r.startswith('.') else './'+r)" "$APP_DIR")
        if [ -f "$BICEPCONFIG" ]; then
          echo "Merging radiusCompute extension into existing $BICEPCONFIG"
          tmp=$(mktemp)
          jq --arg tgz "$TGZ_REF" '
            .experimentalFeaturesEnabled = ((.experimentalFeaturesEnabled // {}) + {extensibility: true})
            | .extensions = (.extensions // {})
            | (if (.extensions | has("radiusCompute")) then . else .extensions.radiusCompute = $tgz end)
          ' "$BICEPCONFIG" > "$tmp" && mv "$tmp" "$BICEPCONFIG"
        else
          echo "Creating $BICEPCONFIG with Radius extensions"
          mkdir -p "$APP_DIR"
          jq -n --arg tgz "$TGZ_REF" '{
            experimentalFeaturesEnabled: { extensibility: true },
            extensions: {
              radius: "br:biceptypes.azurecr.io/radius:latest",
              radiusCompute: $tgz
            }
          }' > "$BICEPCONFIG"
        fi
        echo "Deployment bicepconfig ($BICEPCONFIG):"
        cat "$BICEPCONFIG"


        # Aggregate result accumulators. The result is written by a trap on EXIT so
        # the combined `rad-commands-result` artifact is complete even when a command
        # fails and the step exits early.
        COMMANDS_JSON='[]'
        OVERALL_OUTCOME="succeeded"
        OVERALL_EXIT=0
        REQUESTED=0
        RAN=0

        write_result() {
          jq -n \
            --arg outcome "$OVERALL_OUTCOME" \
            --argjson exitCode "$OVERALL_EXIT" \
            --arg environment "$ENVIRONMENT" \
            --argjson requested "$REQUESTED" \
            --argjson ran "$RAN" \
            --argjson commands "$COMMANDS_JSON" \
            '{schemaVersion:"1.0", outcome:$outcome, exitCode:$exitCode, environment:$environment, commandsRequested:$requested, commandsRan:$ran, commands:$commands}' \
            > "$RESULT_FILE"
        }
        trap write_result EXIT

        # Allowed-command set. Each command's leading verb must be in this list, so
        # commands that do not fit the ephemeral, per-run model — managing or
        # upgrading a control plane, switching workspaces, or changing install state —
        # cannot run. Validation happens before any command runs, so a disallowed
        # command fails fast (exit 2) without deploying anything.
        ALLOWED_VERBS="deploy app resource env recipe group credential resource-type version bicep"
        is_allowed() {
          local verb="${1%% *}"
          case " $ALLOWED_VERBS " in *" $verb "*) return 0 ;; *) return 1 ;; esac
        }

        # Record one command's result into the combined artifact. Keeps live console
        # output via tee while capturing it for the artifact.
        record() {
          local index="$1"; shift
          local display="$1"; shift
          local outfile code
          outfile=$(mktemp)
          echo "::group::rad $display"
          "$@" 2>&1 | tee "$outfile"
          code=${PIPESTATUS[0]}
          echo "::endgroup::"
          RAN=$((RAN + 1))
          COMMANDS_JSON=$(jq \
            --argjson index "$index" \
            --arg cmd "$display" \
            --argjson code "$code" \
            --arg outcome "$([ "$code" -eq 0 ] && echo succeeded || echo failed)" \
            --rawfile out "$outfile" \
            '. + [{index:$index, command:$cmd, outcome:$outcome, exitCode:$code, output:$out}]' \
            <<<"$COMMANDS_JSON")
          rm -f "$outfile"
          return "$code"
        }

        if [ -n "${RAD_COMMANDS//[[:space:]]/}" ]; then
          # Caller-supplied commands: a single command string or a JSON array, run in
          # order with the `rad` prefix omitted.
          if printf '%s' "$RAD_COMMANDS" | jq -e 'type == "array"' >/dev/null 2>&1; then
            mapfile -t COMMANDS < <(printf '%s' "$RAD_COMMANDS" | jq -r '.[]')
          else
            COMMANDS=("$RAD_COMMANDS")
          fi

          # Drop blank entries and validate every command before running any of them.
          CLEAN=()
          for cmd in "${COMMANDS[@]}"; do
            [ -z "${cmd//[[:space:]]/}" ] && continue
            CLEAN+=("$cmd")
          done
          REQUESTED=${#CLEAN[@]}

          for cmd in "${CLEAN[@]}"; do
            if ! is_allowed "$cmd"; then
              OVERALL_OUTCOME="disallowed_command"
              OVERALL_EXIT=2
              COMMANDS_JSON=$(jq --arg cmd "$cmd" \
                '. + [{command:$cmd, outcome:"disallowed", exitCode:2, errorMessage:"Command leading verb is not in the allowed-command set."}]' \
                <<<"$COMMANDS_JSON")
              echo "Disallowed command: rad $cmd" >&2
              exit 2
            fi
          done

          idx=0
          for cmd in "${CLEAN[@]}"; do
            verb="${cmd%% *}"
            if [ "$verb" = "deploy" ]; then
              # For deploy commands, append the image and the secret application
              # parameters. Build an argv array so secret values with special
              # characters are never word-split, and keep them out of the
              # recorded command string (only the non-secret `$cmd` is recorded).
              # shellcheck disable=SC2086
              read -ra CMD_ARGV <<< "$cmd"
              EXTRA_PARAMS=()
              if [ -n "$APP_IMAGE" ]; then
                EXTRA_PARAMS+=(--parameters "image=$APP_IMAGE")
              fi
              if [ -n "${RADIUS_DEPLOY_PARAMS//[[:space:]]/}" ]; then
                while IFS= read -r _pname; do
                  [ -z "$_pname" ] && continue
                  _pval=$(printf '%s' "$RADIUS_DEPLOY_PARAMS" | jq -r --arg k "$_pname" '.[$k]')
                  EXTRA_PARAMS+=(--parameters "$_pname=$_pval")
                done < <(printf '%s' "$RADIUS_DEPLOY_PARAMS" | jq -r 'keys_unsorted[]')
              fi
              if ! record "$idx" "$cmd" rad "${CMD_ARGV[@]}" "${EXTRA_PARAMS[@]}"; then
                OVERALL_OUTCOME="command_failed"
                OVERALL_EXIT=1
                echo "Command failed: rad $cmd" >&2
                exit 1
              fi
            else
              # Intentional word-split: the command string carries its own args.
              # shellcheck disable=SC2086
              if ! record "$idx" "$cmd" rad $cmd; then
                OVERALL_OUTCOME="command_failed"
                OVERALL_EXIT=1
                echo "Command failed: rad $cmd" >&2
                exit 1
              fi
            fi
            idx=$((idx + 1))
          done
          echo "✅ Radius commands complete."
        else
          # Default behavior: deploy the app bicep. Build the parameters as an array
          # so values with special characters are not mangled by the shell.
          REQUESTED=1
          DEPLOY_PARAMS=()
          if [ -n "$APP_IMAGE" ]; then
            DEPLOY_PARAMS+=(--parameters "image=$APP_IMAGE")
          fi
          # Expand the application parameters JSON ({"name":"value", …}) into
          # --parameters name=value pairs. Each value is read back from the JSON
          # by key with jq so embedded '=', spaces, or newlines are preserved and
          # never re-split by the shell.
          if [ -n "${RADIUS_DEPLOY_PARAMS//[[:space:]]/}" ]; then
            while IFS= read -r _pname; do
              [ -z "$_pname" ] && continue
              _pval=$(printf '%s' "$RADIUS_DEPLOY_PARAMS" | jq -r --arg k "$_pname" '.[$k]')
              DEPLOY_PARAMS+=(--parameters "$_pname=$_pval")
            done < <(printf '%s' "$RADIUS_DEPLOY_PARAMS" | jq -r 'keys_unsorted[]')
          fi
          # The recorded command string omits the parameters so secret values are
          # not written into the result artifact.
          if ! record 0 "deploy $APP_FILE --environment $ENVIRONMENT" \
              rad deploy "$APP_FILE" --environment "$ENVIRONMENT" "${DEPLOY_PARAMS[@]}"; then
            OVERALL_OUTCOME="command_failed"
            OVERALL_EXIT=1
            echo "Deployment failed" >&2
            exit 1
          fi
          echo "✅ Deployment complete."
        fi

    - name: Upload command result
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: rad-commands-result
        path: /tmp/radius-output/
        retention-days: 1
