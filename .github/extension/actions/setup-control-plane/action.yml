# Provider-agnostic control-plane setup shared by run-rad-commands-aws.yml and
# run-rad-commands-azure.yml. Installs the runner tooling, stands up the ephemeral
# k3d control-plane cluster, stores the target-cluster kubeconfig as a Secret, and
# installs Radius. Reads RADIUS_TARGET_KUBECONFIG from the job environment (exported
# via $GITHUB_ENV by the caller), so it needs no inputs.
name: Radius - Set up control plane
description: Install tooling, create the ephemeral k3d control plane, and install Radius.

runs:
  using: composite
  steps:
    - name: Install k3d
      shell: bash
      run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

    - name: Create ephemeral Radius control plane cluster
      shell: bash
      run: |
        k3d cluster create radius-cp \
          --volume /var/run/docker.sock:/var/run/docker.sock \
          --volume "${{ github.workspace }}/:/app/demo" \
          --k3s-arg "--disable=traefik@server:*" \
          --wait
        kubectl wait --for=condition=Ready node --all --timeout=120s

    - name: Install oras
      uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1

    - name: Install Radius CLI
      shell: bash
      run: |
        wget -q "https://raw.githubusercontent.com/radius-project/radius/main/deploy/install.sh" -O - | /bin/bash -s edge
        rad version

    - name: Install Terraform
      uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      with:
        terraform_wrapper: false

    - name: Create target-kubeconfig secret
      # The chart's targetCluster seam mounts this secret into applications-rp,
      # dynamic-rp, and bicep-de at install time and sets RADIUS_TARGET_KUBECONFIG,
      # so the secret must exist before `rad install`.
      shell: bash
      run: |
        if [ ! -f "$RADIUS_TARGET_KUBECONFIG" ]; then
          echo "No target kubeconfig; resources will deploy to the control-plane cluster."
          exit 0
        fi
        kubectl create namespace radius-system --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret generic target-kubeconfig \
          --namespace radius-system \
          --from-file=kubeconfig="$RADIUS_TARGET_KUBECONFIG" \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Install Radius on control plane
      shell: bash
      run: |
        # When a target kubeconfig is present, enable the chart's targetCluster
        # seam. It mounts the target-kubeconfig secret into applications-rp,
        # dynamic-rp, and bicep-de and sets RADIUS_TARGET_KUBECONFIG so recipe
        # execution and directly-rendered resources target the external cluster.
        # The Terraform state backend deliberately stays on the control plane.
        #
        # database.enabled=true installs the control-plane PostgreSQL so durable
        # Radius state can be backed up and restored by `rad shutdown`/`rad startup`.
        TARGET_FLAGS=()
        if [ -f "$RADIUS_TARGET_KUBECONFIG" ]; then
          TARGET_FLAGS+=(--set global.targetCluster.enabled=true)
        fi
        rad install kubernetes \
          --set database.enabled=true \
          --set rp.publicEndpointOverride=localhost \
          --set dynamicrp.buildkit.enabled=true \
          "${TARGET_FLAGS[@]}"
        kubectl wait --for=condition=Available deployment --all -n radius-system --timeout=300s
