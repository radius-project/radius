# This workflow is auto-generated by Radius to verify cloud credentials.
name: Radius - Verify Cloud Credentials

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment name'
        required: true
        default: 'dev'

permissions:
  id-token: write
  contents: read

jobs:
  verify:
    name: Verify cloud credentials
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure access
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        run: |
          set -euo pipefail
          echo "Verifying Azure access..."
          az account show --query '{name:name, state:state}' --output table
          echo ""
          echo "✅ Azure credentials are working correctly."

      - name: Configure AWS Credentials (OIDC)
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS access
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' }}
        run: |
          set -euo pipefail
          echo "Verifying AWS access..."
          CALLER_ARN=$(aws sts get-caller-identity --query 'Arn' --output text)
          echo "${CALLER_ARN}" | sed 's/[0-9]\{12\}/****/g'
          echo ""
          echo "✅ AWS credentials are working correctly."

      - name: Discover AWS resources
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' }}
        run: |
          set -euo pipefail
          REGION="${{ vars.AWS_REGION }}"
          CLUSTERS=$(aws eks list-clusters --region "$REGION" --query 'clusters' --output json 2>/dev/null || echo '[]')
          VPCS=$(aws ec2 describe-vpcs --region "$REGION" --query 'Vpcs[].{id:VpcId,name:Tags[?Key==`Name`].Value|[0],isDefault:IsDefault}' --output json 2>/dev/null || echo '[]')
          SUBNETS=$(aws ec2 describe-subnets --region "$REGION" --query 'Subnets[].{id:SubnetId,vpcId:VpcId,az:AvailabilityZone,name:Tags[?Key==`Name`].Value|[0]}' --output json 2>/dev/null || echo '[]')
          printf '{"eksClusters":%s,"vpcs":%s,"subnets":%s}' "$CLUSTERS" "$VPCS" "$SUBNETS" > /tmp/radius-discovery.json

      - name: Upload discovery data
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: radius-discovery
          path: /tmp/radius-discovery.json
          retention-days: 1

      - name: Discover Azure resources
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        run: |
          set -euo pipefail
          SUB="${{ vars.AZURE_SUBSCRIPTION_ID }}"
          RESOURCE_GROUPS=$(az group list --subscription "$SUB" --query '[].{name:name, location:location}' --output json 2>/dev/null || echo '[]')
          AKS_CLUSTERS=$(az aks list --subscription "$SUB" --query '[].{name:name, resourceGroup:resourceGroup, location:location}' --output json 2>/dev/null || echo '[]')
          LOCATIONS=$(az account list-locations --query "[?metadata.regionType=='Physical'].{name:name, displayName:displayName}" --output json 2>/dev/null || echo '[]')
          printf '{"resourceGroups":%s,"aksClusters":%s,"locations":%s}' "$RESOURCE_GROUPS" "$AKS_CLUSTERS" "$LOCATIONS" > /tmp/radius-discovery.json

      - name: Upload Azure discovery data
        if: ${{ vars.AZURE_CLIENT_ID != '' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: radius-discovery
          path: /tmp/radius-discovery.json
          retention-days: 1
