# This workflow is auto-generated by Radius to deploy applications.
# It creates an ephemeral k3d cluster for the Radius control plane, connects
# to the user's target cluster (EKS/AKS), and runs rad deploy.
name: Radius - Deploy Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment name'
        required: true
      image:
        description: 'Container image for the application'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read
  packages: write

env:
  ENVIRONMENT: ${{ inputs.environment }}
  APP_FILE: .radius/app.bicep
  APP_IMAGE: ${{ inputs.image || github.sha || 'latest' }}
  RESOURCE_TYPES_CONTRIB_REPO: https://github.com/radius-project/resource-types-contrib.git
  RESOURCE_TYPES_CONTRIB_REF: main

jobs:
  deploy:
    name: Deploy with Radius
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        if: ${{ vars.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Configure AWS Credentials (OIDC)
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get target cluster kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "RADIUS_TARGET_KUBECONFIG=$HOME/.kube/target-cluster" >> "$GITHUB_ENV"

      - name: Connect to AKS cluster
        if: ${{ vars.AZURE_CLIENT_ID != '' && vars.RADIUS_K8S_CLUSTER != '' }}
        run: |
          az aks get-credentials \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.RADIUS_K8S_CLUSTER }}" \
            --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            --file "$RADIUS_TARGET_KUBECONFIG"

      - name: Connect to EKS cluster
        if: ${{ vars.AWS_IAM_ROLE_ARN != '' && vars.RADIUS_K8S_CLUSTER != '' }}
        run: |
          CLUSTER="${{ vars.RADIUS_K8S_CLUSTER }}"
          REGION="${{ vars.AWS_REGION }}"
          ROLE_ARN="${{ vars.AWS_IAM_ROLE_ARN }}"
          TARGET="$RADIUS_TARGET_KUBECONFIG"

          # Ensure the IAM role has access to the EKS cluster.
          # Creates an access entry if one doesn't already exist.
          echo "Ensuring EKS access entry for $ROLE_ARN..."
          aws eks create-access-entry \
            --cluster-name "$CLUSTER" \
            --principal-arn "$ROLE_ARN" \
            --type STANDARD \
            --region "$REGION" 2>/dev/null || echo "Access entry already exists"
          aws eks associate-access-policy \
            --cluster-name "$CLUSTER" \
            --principal-arn "$ROLE_ARN" \
            --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy \
            --access-scope type=cluster \
            --region "$REGION" 2>/dev/null || echo "Access policy already associated"

          # Build a static kubeconfig with a bearer token instead of exec-based auth.
          # The exec-based config requires aws CLI inside the container, which Radius
          # images don't have.
          ENDPOINT=$(aws eks describe-cluster --name "$CLUSTER" --region "$REGION" --query 'cluster.endpoint' --output text)
          CA_DATA=$(aws eks describe-cluster --name "$CLUSTER" --region "$REGION" --query 'cluster.certificateAuthority.data' --output text)
          TOKEN=$(aws eks get-token --cluster-name "$CLUSTER" --region "$REGION" --output json | jq -r '.status.token')
          printf 'apiVersion: v1\nclusters:\n- cluster:\n    certificate-authority-data: %s\n    server: %s\n  name: eks\ncontexts:\n- context:\n    cluster: eks\n    user: eks-user\n  name: eks\ncurrent-context: eks\nkind: Config\nusers:\n- name: eks-user\n  user:\n    token: %s\n' "$CA_DATA" "$ENDPOINT" "$TOKEN" > "$TARGET"
          echo "EKS kubeconfig saved with static token"
          kubectl --kubeconfig "$TARGET" cluster-info || echo "WARNING: Could not connect to EKS cluster"

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Create ephemeral Radius control plane cluster
        run: |
          k3d cluster create radius-cp \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            --volume "${{ github.workspace }}/:/app/demo" \
            --k3s-arg "--disable=traefik@server:*" \
            --wait
          kubectl wait --for=condition=Ready node --all --timeout=120s

      - name: Install oras
        uses: oras-project/setup-oras@v1

      - name: Install Radius CLI
        run: |
          wget -q "https://raw.githubusercontent.com/radius-project/radius/main/deploy/install.sh" -O - | /bin/bash -s edge
          rad version

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Radius on control plane
        run: |
          rad install kubernetes \
            --set rp.publicEndpointOverride=localhost \
            --set dynamicrp.buildkit.enabled=true
          kubectl wait --for=condition=Available deployment --all -n radius-system --timeout=300s

      - name: Project cloud OIDC tokens into Radius pods
        run: |
          # Mint GitHub OIDC tokens and mount them where Radius expects them.
          # GitHub Actions is already a trusted OIDC issuer for both AWS and Azure
          # (via the CloudFormation template / AAD federated credential), so no
          # custom issuer setup is needed.

          if [ -n "${{ vars.AWS_IAM_ROLE_ARN }}" ]; then
            echo "Projecting AWS OIDC token..."
            AWS_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
            kubectl create secret generic aws-oidc-token -n radius-system \
              --from-literal=token="$AWS_TOKEN" --dry-run=client -o yaml | kubectl apply -f -
          fi

          if [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            echo "Projecting Azure OIDC token..."
            AZ_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r '.value')
            # The secret data key becomes the mounted file name, so it must be
            # 'azure-identity-token' -- the file Radius and the Terraform azurerm
            # provider read from /var/run/secrets/azure/tokens/.
            kubectl create secret generic azure-oidc-token -n radius-system \
              --from-literal=azure-identity-token="$AZ_TOKEN" --dry-run=client -o yaml | kubectl apply -f -
          fi

          # Mount the projected token at the fixed paths Radius reads from. The
          # cloud identity selectors (AWS role ARN, Azure client/tenant id) are NOT
          # set as SDK-native env vars here -- they come from the UCP credential
          # registered later via `rad credential register`. We only project the raw
          # token file that the credential needs for the federated token exchange.

          # AWS IRSA: the UCP AWS proxy (ucp) and the Terraform AWS provider
          # (dynamic-rp) both read the token from the hard-coded path
          # /var/run/secrets/eks.amazonaws.com/serviceaccount/token.
          if [ -n "${{ vars.AWS_IAM_ROLE_ARN }}" ]; then
            AWS_PATCH='[
              {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"aws-oidc-token","secret":{"secretName":"aws-oidc-token"}}},
              {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"aws-oidc-token","mountPath":"/var/run/secrets/eks.amazonaws.com/serviceaccount","readOnly":true}}
            ]'
            for deploy in applications-rp dynamic-rp ucp; do
              kubectl patch deployment $deploy -n radius-system --type=json -p="$AWS_PATCH" 2>/dev/null || true
            done
          fi

          # Azure workload identity: the Go UCPCredential (applications-rp), the
          # .NET Bicep DE (bicep-de) and the Terraform azurerm provider (dynamic-rp)
          # all read /var/run/secrets/azure/tokens/azure-identity-token.
          # AZURE_FEDERATED_TOKEN_FILE is still required because armauth builds the
          # WorkloadIdentityCredential with an empty TokenFilePath and falls back to
          # this env var to locate the token.
          if [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            AZ_PATCH='[
              {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"azure-oidc-token","secret":{"secretName":"azure-oidc-token"}}},
              {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"azure-oidc-token","mountPath":"/var/run/secrets/azure/tokens","readOnly":true}},
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"AZURE_FEDERATED_TOKEN_FILE","value":"/var/run/secrets/azure/tokens/azure-identity-token"}}
            ]'
            for deploy in applications-rp dynamic-rp bicep-de; do
              kubectl patch deployment $deploy -n radius-system --type=json -p="$AZ_PATCH" 2>/dev/null || true
            done
          fi

          # Wait for any patched deployments to roll out.
          for deploy in applications-rp dynamic-rp bicep-de ucp; do
            kubectl rollout status deployment/$deploy -n radius-system --timeout=300s || true
          done
          echo "✅ Cloud OIDC tokens projected into Radius pods."

      - name: Configure external deployment target
        run: |
          TARGET_KUBECONFIG="$RADIUS_TARGET_KUBECONFIG"

          if [ ! -f "$TARGET_KUBECONFIG" ]; then
            echo "No target kubeconfig found, resources will deploy to k3d cluster"
            exit 0
          fi

          # Refresh EKS token right before creating the secret.
          if [ -n "${{ vars.AWS_IAM_ROLE_ARN }}" ] && [ -n "${{ vars.RADIUS_K8S_CLUSTER }}" ]; then
            echo "Generating fresh EKS token..."
            CLUSTER="${{ vars.RADIUS_K8S_CLUSTER }}"
            REGION="${{ vars.AWS_REGION }}"
            ENDPOINT=$(aws eks describe-cluster --name "$CLUSTER" --region "$REGION" --query 'cluster.endpoint' --output text)
            CA_DATA=$(aws eks describe-cluster --name "$CLUSTER" --region "$REGION" --query 'cluster.certificateAuthority.data' --output text)
            TOKEN=$(aws eks get-token --cluster-name "$CLUSTER" --region "$REGION" --output json | jq -r '.status.token')
            printf 'apiVersion: v1\nclusters:\n- cluster:\n    certificate-authority-data: %s\n    server: %s\n  name: eks\ncontexts:\n- context:\n    cluster: eks\n    user: eks-user\n  name: eks\ncurrent-context: eks\nkind: Config\nusers:\n- name: eks-user\n  user:\n    token: %s\n' "$CA_DATA" "$ENDPOINT" "$TOKEN" > "$TARGET_KUBECONFIG"
          fi

          echo "Configuring Radius to deploy to external target cluster..."
          kubectl delete secret target-kubeconfig -n radius-system --ignore-not-found
          kubectl create secret generic target-kubeconfig --namespace radius-system --from-file=config="$TARGET_KUBECONFIG"

          # Check if deployments already have the volume mount (from a previous run).
          if ! kubectl get deployment applications-rp -n radius-system -o jsonpath='{.spec.template.spec.volumes[*].name}' | grep -q target-kubeconfig; then
            PATCH='[
              {"op":"add","path":"/spec/template/spec/volumes/-","value":{"name":"target-kubeconfig","secret":{"secretName":"target-kubeconfig"}}},
              {"op":"add","path":"/spec/template/spec/containers/0/volumeMounts/-","value":{"name":"target-kubeconfig","mountPath":"/etc/radius/target-kubeconfig","readOnly":true}},
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"RADIUS_TARGET_KUBECONFIG","value":"/etc/radius/target-kubeconfig/config"}}
            ]'
            for deploy in applications-rp dynamic-rp; do
              kubectl patch deployment $deploy -n radius-system --type=json -p="$PATCH"
            done

            # Set KUBE_CONFIG_PATH on dynamic-rp so Terraform's kubernetes provider deploys to the target cluster
            kubectl patch deployment dynamic-rp -n radius-system --type=json -p='[
              {"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"KUBE_CONFIG_PATH","value":"/etc/radius/target-kubeconfig/config"}}
            ]'
          else
            # Secret updated — restart pods to pick up new token.
            kubectl rollout restart deployment/applications-rp -n radius-system
            kubectl rollout restart deployment/dynamic-rp -n radius-system
          fi

          echo "Waiting for rollouts..."
          kubectl rollout status deployment/applications-rp -n radius-system --timeout=300s
          kubectl rollout status deployment/dynamic-rp -n radius-system --timeout=300s
          kubectl rollout status deployment/bicep-de -n radius-system --timeout=300s
          echo "External deployment target configured."

      - name: Configure Radius environment
        run: |
          NAMESPACE="${{ vars.RADIUS_K8S_NAMESPACE || 'default' }}"

          # Ensure namespace exists on target cluster before Radius deploys into it.
          TARGET_KUBECONFIG="$RADIUS_TARGET_KUBECONFIG"
          if [ -f "$TARGET_KUBECONFIG" ]; then
            echo "Ensuring namespace $NAMESPACE exists on target cluster..."
            kubectl --kubeconfig "$TARGET_KUBECONFIG" get namespace "$NAMESPACE" 2>/dev/null ||               kubectl --kubeconfig "$TARGET_KUBECONFIG" create namespace "$NAMESPACE"
          fi

          # The Radius.Core/environments resource (with its recipe pack and
          # cloud providers) is created later via Bicep, so we only set up the
          # workspace and resource group here.
          rad workspace create kubernetes default
          rad group create default
          rad group switch default

      - name: Register cloud credentials with Radius
        run: |
          # Register the cloud identity with Radius using its UCP credential model.
          # Radius stores only the identity selector (AWS role ARN / Azure client +
          # tenant id); the short-lived token is read at runtime from the GitHub
          # OIDC token file projected into the pods in the earlier step. This keeps
          # the credential visible to `rad credential show`, rotatable, and usable
          # by both the Bicep and Terraform code paths.
          if [ -n "${{ vars.AWS_IAM_ROLE_ARN }}" ]; then
            echo "Registering AWS IRSA credential..."
            rad credential register aws irsa --iam-role "${{ vars.AWS_IAM_ROLE_ARN }}"
          fi
          if [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            echo "Registering Azure workload identity credential..."
            rad credential register azure wi \
              --client-id "${{ vars.AZURE_CLIENT_ID }}" \
              --tenant-id "${{ vars.AZURE_TENANT_ID }}"
          fi
          echo "✅ Cloud credentials registered with Radius."

      - name: Clone resource-types-contrib and register resource types
        run: |
          git clone --depth 1 --branch "${{ env.RESOURCE_TYPES_CONTRIB_REF }}" "${{ env.RESOURCE_TYPES_CONTRIB_REPO }}" /tmp/resource-types-contrib

          for TYPE_YAML in \
            Compute/containerImages/containerImages.yaml \
            Data/mySqlDatabases/mySqlDatabases.yaml; do
            if [ -f "/tmp/resource-types-contrib/$TYPE_YAML" ]; then
              echo "Registering $TYPE_YAML..."
              rad resource-type create -f "/tmp/resource-types-contrib/$TYPE_YAML" || \
                (echo "Retrying after 5s..." && sleep 5 && rad resource-type create -f "/tmp/resource-types-contrib/$TYPE_YAML")
            else
              echo "Skipping $TYPE_YAML (not found)"
            fi
          done
          echo "✅ Resource types registered"

          # Build a local Bicep extension from the containerImages type definition.
          CONTAINER_IMAGES_YAML="/tmp/resource-types-contrib/Compute/containerImages/containerImages.yaml"
          if [ -f "$CONTAINER_IMAGES_YAML" ]; then
            echo "Building local Bicep extension for containerImages..."
            rad bicep publish-extension -f "$CONTAINER_IMAGES_YAML" --target ./radiuscompute.tgz --force
            echo "✅ radiuscompute.tgz built"
          fi

      - name: Create bicepconfig for deployment
        run: |
          cat > bicepconfig.json << 'EOF'
          {
            "experimentalFeaturesEnabled": {
              "extensibility": true
            },
            "extensions": {
              "radius": "br:biceptypes.azurecr.io/radius:latest",
              "radiusCompute": "./radiuscompute.tgz",
              "radiusData": "br:biceptypes.azurecr.io/radiusdata:latest",
              "radiusSecurity": "br:biceptypes.azurecr.io/radiussecurity:latest",
              "aws": "br:biceptypes.azurecr.io/aws:latest"
            }
          }
          EOF
          echo "bicepconfig.json created"
          cat bicepconfig.json

      - name: Create Radius environment and recipe pack
        run: |
          REPO="${{ env.RESOURCE_TYPES_CONTRIB_REPO }}"
          REF="${{ env.RESOURCE_TYPES_CONTRIB_REF }}"
          NAMESPACE="${{ vars.RADIUS_K8S_NAMESPACE || 'default' }}"

          # Registry and credentials for the Radius.Compute/containerImages recipe.
          # The recipe builds images with the in-pod BuildKit and pushes them to
          # $BUILD_REGISTRY, authenticating with the Kubernetes Secret named
          # $REGISTRY_SECRET_NAME (created in the app's runtime namespace below).
          # The registry path must be lowercase.
          BUILD_REGISTRY=$(echo "${{ vars.RADIUS_BUILD_REGISTRY || format('ghcr.io/{0}', github.repository_owner) }}" | tr '[:upper:]' '[:lower:]')
          REGISTRY_SECRET_NAME="ghcr-registry-creds"

          # Select the provider-specific Terraform recipe pack. An AWS environment
          # registers the AWS recipe pack; an Azure environment registers the Azure
          # recipe pack. Both bundle the shared Kubernetes compute/data recipes and
          # differ only in the mySQL database recipe and cloud provider config.
          MYSQL_RECIPE=""
          CLOUD_PROVIDER=""
          if [ -n "${{ vars.AWS_IAM_ROLE_ARN }}" ]; then
            PACK_NAME="aws-terraform"
            MYSQL_RECIPE=$(cat <<EOF
          'Radius.Data/mySqlDatabases': {
            kind: 'terraform'
            source: 'git::$REPO//Data/mySqlDatabases/recipes/aws/terraform?ref=$REF'
            parameters: {
              vpcId: '${{ vars.RADIUS_VPC_ID }}'
              subnetIds: '${{ vars.RADIUS_SUBNET_IDS }}'
            }
          }
          EOF
          )
            CLOUD_PROVIDER=$(cat <<EOF
          aws: {
            accountId: '${{ vars.AWS_ACCOUNT_ID }}'
            region: '${{ vars.AWS_REGION }}'
          }
          EOF
          )
          elif [ -n "${{ vars.AZURE_CLIENT_ID }}" ]; then
            PACK_NAME="azure-terraform"
            MYSQL_RECIPE=$(cat <<EOF
          'Radius.Data/mySqlDatabases': {
            kind: 'terraform'
            source: 'git::$REPO//Data/mySqlDatabases/recipes/azure/terraform?ref=sk593/add-azure-mysql-recipe'
            parameters: {
              azure_subscription_id: '${{ vars.AZURE_SUBSCRIPTION_ID }}'
              resourceGroupName: '${{ vars.AZURE_RESOURCE_GROUP }}'
              location: '${{ vars.AZURE_LOCATION || 'eastus' }}'
            }
          }
          EOF
          )
            CLOUD_PROVIDER=$(cat <<EOF
          azure: {
            subscriptionId: '${{ vars.AZURE_SUBSCRIPTION_ID }}'
            resourceGroupName: '${{ vars.AZURE_RESOURCE_GROUP }}'
          }
          EOF
          )
          else
            PACK_NAME="kubernetes-terraform"
          fi
          echo "Selected recipe pack: $PACK_NAME"

          # Generate a Bicep file that defines a recipe pack bundling every
          # recipe and a Radius.Core/environments resource that references it.
          cat > radius-env.bicep <<EOF
          extension radius

          resource recipePack 'Radius.Core/recipePacks@2025-08-01-preview' = {
            name: '$PACK_NAME'
            properties: {
              recipes: {
                'Radius.Compute/containerImages': {
                  kind: 'terraform'
                  source: 'git::$REPO//Compute/containerImages/recipes/kubernetes/terraform?ref=$REF'
                  parameters: {
                    registry: '$BUILD_REGISTRY'
                    registrySecretName: '$REGISTRY_SECRET_NAME'
                  }
                }
                'Radius.Compute/containers': {
                  kind: 'terraform'
                  source: 'git::$REPO//Compute/containers/recipes/kubernetes/terraform?ref=$REF'
                }
                'Radius.Compute/persistentVolumes': {
                  kind: 'terraform'
                  source: 'git::$REPO//Compute/persistentVolumes/recipes/kubernetes/terraform?ref=$REF'
                }
                'Radius.Compute/routes': {
                  kind: 'terraform'
                  source: 'git::$REPO//Compute/routes/recipes/kubernetes/terraform?ref=$REF'
                }
                'Radius.Data/postgreSqlDatabases': {
                  kind: 'terraform'
                  source: 'git::$REPO//Data/postgreSqlDatabases/recipes/kubernetes/terraform?ref=$REF'
                }
                'Radius.Security/secrets': {
                  kind: 'terraform'
                  source: 'git::$REPO//Security/secrets/recipes/kubernetes/terraform?ref=$REF'
                }
          $MYSQL_RECIPE
              }
            }
          }

          resource env 'Radius.Core/environments@2025-08-01-preview' = {
            name: '$ENVIRONMENT'
            properties: {
              recipePacks: [
                recipePack.id
              ]
              providers: {
                kubernetes: {
                  namespace: '$NAMESPACE'
                }
          $CLOUD_PROVIDER
              }
            }
          }
          EOF

          echo "Generated radius-env.bicep:"
          cat radius-env.bicep
          echo ""
          echo "Deploying Radius.Core/environments and recipe pack..."
          rad deploy radius-env.bicep
          echo "✅ Environment '$ENVIRONMENT' created with recipe pack."

      - name: Verify app namespace on target cluster
        run: |
          TARGET_KUBECONFIG="$RADIUS_TARGET_KUBECONFIG"
          if [ -f "$TARGET_KUBECONFIG" ]; then
            BICEP_APP_NAME=$(grep -oP "name:\s*'\K[^']+" ".radius/app.bicep" 2>/dev/null | head -1)
            if [ -z "$BICEP_APP_NAME" ]; then
              BICEP_APP_NAME="app"
            fi
            APP_NS="default-$BICEP_APP_NAME"
            echo "Ensuring namespace $APP_NS exists on target cluster..."
            kubectl --kubeconfig "$TARGET_KUBECONFIG" get namespace "$APP_NS" 2>/dev/null ||               kubectl --kubeconfig "$TARGET_KUBECONFIG" create namespace "$APP_NS"
          fi

      - name: Create registry credentials for image builds
        run: |
          # The Radius.Compute/containerImages recipe builds images with the in-pod
          # BuildKit and pushes them using a Kubernetes Secret (string keys
          # `username`/`password`) named by the recipe pack's registrySecretName.
          # The recipe runs inside the dynamic-rp Pod and reads this Secret from the
          # app's runtime namespace on the control-plane cluster using in-cluster
          # credentials, so create it there (plain kubectl == control-plane cluster).
          NAMESPACE="${{ vars.RADIUS_K8S_NAMESPACE || 'default' }}"
          BICEP_APP_NAME=$(grep -oP "name:\s*'\K[^']+" "$APP_FILE" 2>/dev/null | head -1)
          if [ -z "$BICEP_APP_NAME" ]; then
            BICEP_APP_NAME="app"
          fi
          APP_NS="${NAMESPACE}-${BICEP_APP_NAME}"

          kubectl create namespace "$APP_NS" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic ghcr-registry-creds \
            -n "$APP_NS" \
            --from-literal=username="${{ github.actor }}" \
            --from-literal=password="${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ Registry credentials secret 'ghcr-registry-creds' created in namespace '$APP_NS'."

      - name: Deploy application
        run: |
          echo "Deploying $APP_FILE to environment $ENVIRONMENT..."

          # Ensure the radiusCompute extension is imported for Radius.Compute/containerImages.
          # Without it, the Bicep compiler routes Radius.Compute types to Azure ARM instead of UCP.
          if ! grep -q 'extension radiusCompute' "$APP_FILE"; then
            echo "Injecting 'extension radiusCompute' into $APP_FILE"
            sed -i '/^extension radius$/a extension radiusCompute' "$APP_FILE"
          fi
          echo "Bicep extensions in $APP_FILE:"
          grep '^extension ' "$APP_FILE" || true

          DEPLOY_PARAMS=()
          if [ -n "$APP_IMAGE" ]; then
            DEPLOY_PARAMS+=(--parameters "image=$APP_IMAGE")
          fi
          # Pass the DB password via env var to avoid shell expansion/mangling
          # of special characters (#, $, &, etc.) on the rad deploy command line.
          export RADIUS_DB_PASSWORD="${{ secrets.RADIUS_DB_PASSWORD }}"
          if [ -n "$RADIUS_DB_PASSWORD" ]; then
            DEPLOY_PARAMS+=(--parameters "password=$RADIUS_DB_PASSWORD")
          fi
          rad deploy "$APP_FILE" --environment "$ENVIRONMENT" "${DEPLOY_PARAMS[@]}"
          echo ""
          echo "✅ Deployment complete."

      - name: Show application status
        if: always()
        run: |
          rad app list || true

      - name: Collect Radius logs
        if: failure()
        run: |
          mkdir -p /tmp/radius-logs
          for deploy in applications-rp dynamic-rp bicep-de controller ucpd; do
            kubectl logs -n radius-system -l app.kubernetes.io/name=$deploy --tail=200 >> /tmp/radius-logs/$deploy.log 2>&1 || true
          done
          kubectl get pods -n radius-system -o wide >> /tmp/radius-logs/pods.txt 2>&1 || true
          kubectl get events -n radius-system --sort-by=.lastTimestamp >> /tmp/radius-logs/events.txt 2>&1 || true

          # Collect app pod logs and events from target cluster
          APP_NS="default-todo-list-app"
          TKC="$RADIUS_TARGET_KUBECONFIG"
          KC=""; [ -f "$TKC" ] && KC="--kubeconfig $TKC"
          if kubectl $KC get ns "$APP_NS" &>/dev/null; then
            kubectl $KC get pods -n "$APP_NS" -o wide >> /tmp/radius-logs/app-pods.txt 2>&1 || true
            kubectl $KC get events -n "$APP_NS" --sort-by=.lastTimestamp >> /tmp/radius-logs/app-events.txt 2>&1 || true
            for pod in $(kubectl $KC get pods -n "$APP_NS" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              kubectl $KC logs -n "$APP_NS" "$pod" --all-containers --tail=100 >> "/tmp/radius-logs/app-pod-$pod.log" 2>&1 || true
              kubectl $KC describe pod -n "$APP_NS" "$pod" >> "/tmp/radius-logs/app-describe-$pod.txt" 2>&1 || true
            done
            kubectl $KC get secret dbsecret -n "$APP_NS" -o jsonpath='{.data}' >> /tmp/radius-logs/app-dbsecret-keys.txt 2>&1 || true
          fi

      - name: Upload Radius logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: radius-logs
          path: /tmp/radius-logs/
          retention-days: 3

      - name: Cleanup control plane cluster
        if: always()
        run: k3d cluster delete radius-cp || true
