# yaml-language-server: $schema=https://www.schemastore.org/yamllint.json
# docs: https://yamllint.readthedocs.io/en/stable/configuration.html#extending-the-default-configuration
# ------------------------------------------------------------------------------
# This file is synced from the radius-project/.github repository.
# DO NOT EDIT MANUALLY - changes will be overwritten by the next sync.
# Source: https://github.com/radius-project/.github
# ------------------------------------------------------------------------------
---
extends: default

locale: en_US.UTF-8

rules:
  document-start:
    level: warning
    ignore:
      - .cspell.yml
  line-length: disable
  quoted-strings:
    level: error
    quote-type: double
    required: only-when-needed
    # dependabot.yml is generated by sync and quotes path values like "/"; the
    # rule stays enabled for every other file.
    ignore:
      - dependabot.yml
  comments:
    min-spaces-from-content: 1
  braces:
    level: warning
    min-spaces-inside: 0
    max-spaces-inside: 1
  truthy:
    check-keys: false

ignore-from-file:
  - .gitignore
  - .yamlignore
