# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: radius-bot

on:
  issue_comment:
    types: [created]

permissions: {}

jobs:
  radius-bot:
    name: Run Radius Bot script
    # Only run on the main repository - secrets aren't available on forks
    if: github.repository == 'radius-project/radius'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write # Required to assign the commenter to the issue via the /assign command
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: |
            .github/scripts/radius-bot.js
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Comment analyzer
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TEAM_SLUG: approvers-radius
        with:
          github-token: ${{ github.token }}
          script: |
            const script = require('./.github/scripts/radius-bot.js')
            await script({github, context})
