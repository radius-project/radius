# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Nightly rad CLI tests

on:
  schedule:
    # Run every day at 11:47 PM UTC
    - cron: 47 23 * * *
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/nightly-rad-CLI-tests.yaml

permissions: {}

jobs:
  download:
    if: github.repository == 'radius-project/radius'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            file: rad
          - os: linux
            arch: arm64
            file: rad
          - os: linux
            arch: arm
            file: rad
          - os: darwin
            arch: amd64
            file: rad
          - os: darwin
            arch: arm64
            file: rad
          - os: windows
            arch: amd64
            file: rad
            ext: .exe
          - os: windows
            arch: arm64
            file: rad
            ext: .exe
            minimum_version: v0.60.0
    permissions:
      contents: read
      issues: write # Required to create an issue when the nightly run fails
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Test CLI download
        env:
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_FILE: ${{ matrix.file }}
          MATRIX_EXT: ${{ matrix.ext }}
          MATRIX_MINIMUM_VERSION: ${{ matrix.minimum_version }}
        run: >-
          make test-cli-download
          CLI_DOWNLOAD_OS="${MATRIX_OS}"
          CLI_DOWNLOAD_ARCH="${MATRIX_ARCH}"
          CLI_DOWNLOAD_FILE="${MATRIX_FILE}"
          CLI_DOWNLOAD_EXT="${MATRIX_EXT}"
          CLI_DOWNLOAD_MINIMUM_VERSION="${MATRIX_MINIMUM_VERSION}"

      - name: Create GitHub issue on failure
        if: ${{ failure() }}
        run: |
          gh issue create \
            --title "CLI nightly test failed - ${MATRIX_OS}-${MATRIX_ARCH}" \
            --body "Test failed on ${GITHUB_REPOSITORY} for ${MATRIX_OS}-${MATRIX_ARCH}. See [workflow logs](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) for more details." \
            --label "test-failure" \
            --repo "${GITHUB_REPOSITORY}"
        env:
          GH_TOKEN: ${{ github.token }}
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_ARCH: ${{ matrix.arch }}
