# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Functional Test - GitHub Workspace

# Tests the 'github' workspace kind end-to-end:
#   1. rad init --kind github  →  creates k3d cluster + installs Radius with PostgreSQL
#   2. (future) deploy a demo app and verify resources
#   3. rad shutdown --cleanup  →  backs up PostgreSQL to radius-state branch
#   4. rad init --kind github  →  verifies state is restored from backup
#
# See docs/contributing/github-workspace.md for the full design.

on:
  # Enable manual trigger for development and debugging.
  # TODO: comment out workflow_dispatch before merging to production if this workflow
  # is scheduled or triggered automatically from another workflow.
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to run the workflow on
        required: false
        default: main

  # Run on PRs touching workspace / PostgreSQL / k3d code paths.
  pull_request:
    branches:
      - main
      - features/*
      - release/*
    paths:
      - pkg/cli/k3d/**
      - pkg/cli/pgbackup/**
      - pkg/cli/gitstate/**
      - pkg/cli/cmd/shutdown/**
      - pkg/cli/cmd/radinit/**
      - pkg/cli/workspaces/**
      - deploy/Chart/**
      - .github/workflows/functional-test-github-workspace.yaml

permissions: {}

env:
  # k3d version to install
  K3D_VER: v5.8.3
  # kubectl version
  KUBECTL_VER: v1.30.0
  # Helm version
  HELM_VER: v3.19.4
  # The Radius helm chart location
  RADIUS_CHART_LOCATION: deploy/Chart/
  # The git branch used for PostgreSQL state backups
  RADIUS_STATE_BRANCH: radius-state
  # Timeout for rad init
  RAD_INIT_TIMEOUT: 10m

jobs:
  test:
    name: GitHub Workspace End-to-End Test
    # Only run on the main repository; forks lack the k3d runner resources and
    # the write permission needed to push the radius-state branch.
    if: github.repository == 'radius-project/radius'
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Fetch all branches so the radius-state branch can be found on restore.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccabd7a4ca3521eb94743f40132 # v5.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build rad CLI
        run: |
          make build
          mkdir -p ./bin
          cp ./dist/linux_amd64/release/rad ./bin/rad
          chmod +x ./bin/rad
          echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Verify rad CLI
        run: |
          rad version
          rad --help

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=${{ env.K3D_VER }} bash
          k3d version

      - uses: azure/setup-kubectl@776406ecffb20c6b1c3f3d74e45c368e65e5680a # v4.0.1
        with:
          version: ${{ env.KUBECTL_VER }}

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: ${{ env.HELM_VER }}

      - name: Configure git identity for state commits
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      # ---------------------------------------------------------------------------
      # Phase 1: Initialize Radius with GitHub workspace kind
      # ---------------------------------------------------------------------------

      - name: rad init (first run — no prior state)
        run: make workflow-github-workspace-init
        env:
          RAD_INIT_TIMEOUT: ${{ env.RAD_INIT_TIMEOUT }}

      - name: Verify Radius is running
        run: |
          kubectl --context k3d-radius-github -n radius-system get pods
          rad env list

      # ---------------------------------------------------------------------------
      # Phase 2: Deploy demo content
      #
      # Currently this step is a placeholder. The repo under test is empty; there
      # is no application to deploy yet.
      #
      # Future work: when a demo application is available, replace this step with:
      #   rad deploy <app-bicep-file>
      #   rad resource list Applications.Core/containers
      # and add assertions that the expected resources exist.
      # See docs/contributing/github-workspace.md §"Demo Application" for details.
      # ---------------------------------------------------------------------------

      - name: Deploy demo content (placeholder)
        run: |
          echo "No demo application yet. Future: rad deploy <app>"

      # ---------------------------------------------------------------------------
      # Phase 3: Shut down — back up state and delete cluster
      # ---------------------------------------------------------------------------

      - name: rad shutdown (backup + delete cluster)
        run: make workflow-github-workspace-shutdown
        env:
          RADIUS_STATE_BRANCH: ${{ env.RADIUS_STATE_BRANCH }}

      # The state files (.radius/state/*.sql) and the local radius-state git branch
      # persist on this runner between steps — no push to origin is needed for the
      # round-trip test. The gitstate package committed the SQL files to the local
      # radius-state branch; rad init will restore from it in Phase 4.
      #
      # NOTE: In a real demo repo you would persist state across *runs*, not just
      # steps. See docs/contributing/github-workspace.md §"State Persistence" for
      # the recommended approach (Actions artifact upload/download).

      # ---------------------------------------------------------------------------
      # Phase 4: Restore — re-init and verify state round-trips
      # ---------------------------------------------------------------------------

      - name: rad init (second run — should restore state from local radius-state branch)
        run: make workflow-github-workspace-init
        env:
          RAD_INIT_TIMEOUT: ${{ env.RAD_INIT_TIMEOUT }}

      - name: Verify state was restored
        run: make workflow-github-workspace-verify-restore

      # ---------------------------------------------------------------------------
      # Phase 5: Final cleanup
      # ---------------------------------------------------------------------------

      - name: Cleanup k3d cluster
        if: always()
        run: k3d cluster delete radius-github || true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: github-workspace-test-logs
          path: dist/logs/
          retention-days: 3
