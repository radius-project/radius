# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: contrib-update-resource-types

# Triggered via `repository_dispatch` (event type `resource-types-contrib-updated`)
# from radius-project/resource-types-contrib's notify-radius.yaml. A single event
# type carries both channels in its client_payload:
#   - channel "edge":    a push to contrib `main`; contrib_ref is the pushed
#                        commit SHA.
#   - channel "release": a published contrib release; contrib_ref is the release
#                        tag (a scope-prefixed tag affects one namespace, a plain
#                        vX.Y.Z affects all).
# The payload lists exactly the affected `Radius.<Category>` namespaces, each with
# its immutable ref:
#   { channel, contrib_repo, contrib_ref, namespaces: [ {namespace, ref}, ... ], actor }
#
# This job opens (or refreshes) a PR that runs `make update-resource-types` with
# those pins, which resolves each ref to an immutable commit SHA, records it per
# namespace in deploy/manifest/defaults.yaml (sources[].ref), and re-copies the
# manifests under deploy/manifest/built-in-providers/ - advancing only the
# namespaces the event changed (namespaces Radius does not register are skipped).
#
# Merging the resulting PR triggers the existing `build-and-push-bicep-types`
# job in build.yaml, which dispatches to azure-octo/radius-publisher to
# republish `radius:latest` with the refreshed contrib types.
#
# See the design notes:
#   eng/design-notes/extensibility/2026-05-unified-bicep-extension-publishing.md
#   eng/design-notes/extensibility/2026-06-resource-types-sync-without-fake-go-module.md

on:
  repository_dispatch:
    types:
      - resource-types-contrib-updated

permissions: {}

concurrency:
  # Only one in-flight refresh PR at a time.
  group: contrib-update-resource-types
  cancel-in-progress: false

env:
  PR_BRANCH: bot/update-resource-types
  CONTRIB_REPO: radius-project/resource-types-contrib

jobs:
  open-update-pr:
    name: Open update-resource-types PR
    if: github.repository == 'radius-project/radius'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read # actions/checkout
    steps:
      - name: Resolve dispatch payload
        # client_payload.namespaces must be a non-empty JSON array of
        # {namespace, ref}. Each value is checked against an allowlist before
        # the array is forwarded as RESOURCE_TYPES_PINS, so make advances only
        # the affected, registered namespaces.
        id: contrib
        env:
          NAMESPACES_JSON: ${{ toJSON(github.event.client_payload.namespaces) }}
          CHANNEL: ${{ github.event.client_payload.channel }}
          CONTRIB_REF: ${{ github.event.client_payload.contrib_ref }}
          ACTOR: ${{ github.event.client_payload.actor }}
        run: |
          set -euo pipefail
          ns_re='^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$'
          ref_re='^[A-Za-z0-9][A-Za-z0-9._/-]{0,127}$'

          ns_json="${NAMESPACES_JSON:-null}"
          if ! printf '%s' "${ns_json}" | jq -e '
            type == "array" and
            length > 0 and
            all(.[]; type == "object" and
              (.namespace | type == "string") and
              (.ref | type == "string"))
          ' > /dev/null; then
            echo "ERROR: repository_dispatch requires a non-empty namespaces" \
              "array of {namespace, ref} objects." >&2
            exit 1
          fi

          while IFS=$'\t' read -r ns ref; do
            if ! printf '%s' "${ns}" | grep -Eq "${ns_re}"; then
              echo "ERROR: invalid namespace '${ns}'" >&2
              exit 1
            fi
            if ! printf '%s' "${ref}" | grep -Eq "${ref_re}"; then
              echo "ERROR: invalid ref '${ref}' for '${ns}'" >&2
              exit 1
            fi
          done < <(
            printf '%s' "${ns_json}" |
              jq -r '.[] | [.namespace, .ref] | @tsv'
          )

          pins="$(printf '%s' "${ns_json}" | jq -c '[.[] | {namespace, ref}]')"
          affected="$(
            printf '%s' "${ns_json}" |
              jq -r '[.[].namespace] | join(", ")'
          )"
          {
            echo "pins<<PINS_EOF"
            printf '%s\n' "${pins}"
            echo "PINS_EOF"
            echo "channel=${CHANNEL:-edge}"
            echo "ref=${CONTRIB_REF:-}"
            echo "actor=${ACTOR:-}"
            echo "affected=${affected}"
          } >> "${GITHUB_OUTPUT}"
          echo "Batch: channel=${CHANNEL:-edge} ref=${CONTRIB_REF:-}" \
            "namespaces=[${affected}]"

      - name: Generate App Token
        # Uses a GitHub App token instead of the default GITHUB_TOKEN so that
        # the bot can push the PR branch and the resulting PR triggers CI checks.
        # The default GITHUB_TOKEN cannot trigger workflows on pushes it creates.
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RESOURCE_TYPES_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RESOURCE_TYPES_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            radius
          permission-metadata: read
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Git identity
        # Configure git author for the automated commit on the PR branch.
        run: |
          git config user.name "Radius CI Bot"
          git config user.email "radiuscoreteam@service.microsoft.com"

      - name: Prepare cumulative update branch
        # Preserve unmerged namespace updates from earlier dispatches. Starting
        # each run from main would let a later namespace-only event overwrite
        # an earlier pending update on the shared bot branch.
        run: |
          set -euo pipefail
          git fetch origin main
          if git ls-remote --exit-code --heads origin "${PR_BRANCH}" \
              > /dev/null 2>&1; then
            git fetch origin "${PR_BRANCH}:refs/remotes/origin/${PR_BRANCH}"
            git checkout -B "${PR_BRANCH}" "origin/${PR_BRANCH}"
            git rebase origin/main
          else
            git checkout -B "${PR_BRANCH}" origin/main
          fi

      - name: Install yq
        # Required by make update-resource-types / sync-resource-types to parse
        # deploy/manifest/defaults.yaml.
        run: make install-yq

      - name: Run make update-resource-types
        # Advances the affected namespaces: pins each to its immutable commit SHA
        # in deploy/manifest/defaults.yaml (sources[].ref) and copies the manifest
        # files into deploy/manifest/built-in-providers/{dev,self-hosted}/.
        # RESOURCE_TYPES_PINS (the contrib namespaces[] payload) drives the
        # batch.
        env:
          RESOURCE_TYPES_PINS: ${{ steps.contrib.outputs.pins }}
        run: |
          set -euo pipefail
          make update-resource-types

      - name: Detect changes
        # Uses git status --porcelain (not git diff --quiet) because
        # make update-resource-types may create new untracked files when new
        # resource types are added to defaults.yaml. git diff only detects
        # modifications to already-tracked files.
        id: changes
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "No changes from 'make update-resource-types'; nothing to do."
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create or update PR branch
        # Rebase keeps pending updates cumulative; force-with-lease publishes
        # the rewritten history without overwriting a concurrent remote update.
        if: steps.changes.outputs.changed == 'true'
        env:
          CHANNEL: ${{ steps.contrib.outputs.channel }}
          AFFECTED: ${{ steps.contrib.outputs.affected }}
        run: |
          set -euo pipefail
          git add -A
          message="chore: refresh resource type manifests from ${CONTRIB_REPO}"
          message+=" (${CHANNEL}: ${AFFECTED:-all})"
          git commit -m "${message}"
          git push --force-with-lease origin "HEAD:${PR_BRANCH}"

      - name: Open or update pull request
        # Creates a new PR if none exists for the bot branch, or updates the
        # existing one's title and body. Uses github-script because we need
        # conditional create-or-update logic that gh pr create doesn't support.
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          CHANNEL: ${{ steps.contrib.outputs.channel }}
          AFFECTED: ${{ steps.contrib.outputs.affected }}
          CONTRIB_REF: ${{ steps.contrib.outputs.ref }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const branch = process.env.PR_BRANCH;
            const channel = process.env.CHANNEL || "edge";
            const affected = process.env.AFFECTED || "";
            const contribRef = process.env.CONTRIB_REF || "";
            const title = "chore: refresh resource type manifests from resource-types-contrib";
            const body = [
              "Automated refresh of resource type manifests under `deploy/manifest/built-in-providers/`.",
              "",
              `Triggered by [\`${process.env.CONTRIB_REPO}\`](https://github.com/${process.env.CONTRIB_REPO}) on the \`${channel}\` channel at ref \`${contribRef}\`.`,
              affected ? `Affected namespaces: ${affected}.` : "",
              "",
              "Each affected namespace is pinned to an immutable commit SHA in `deploy/manifest/defaults.yaml` (`sources[].ref`).",
              "",
              "Merging this PR will republish `br:biceptypes.azurecr.io/radius:latest` via the existing `build-and-push-bicep-types` job in `build.yaml`.",
            ].filter(Boolean).join("\n");

            const { owner, repo } = context.repo;
            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${branch}`,
              state: "open",
            });

            if (existing.length === 0) {
              const { data: pr } = await github.rest.pulls.create({
                owner,
                repo,
                title,
                head: branch,
                base: "main",
                body,
              });
              core.notice(`Opened PR #${pr.number}: ${pr.html_url}`);
            } else {
              const pr = existing[0];
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pr.number,
                title,
                body,
              });
              core.notice(`Refreshed existing PR #${pr.number}: ${pr.html_url}`);
            }
