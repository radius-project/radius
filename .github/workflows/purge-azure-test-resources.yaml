# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Purge Azure test resources

on:
  # Enable manual trigger
  workflow_dispatch:
  schedule:
    # Run twice a day
    - cron: 30 0,12 * * *

permissions: {}

env:
  AZURE_RG_DELETE_LIST_FILE: az_rg_list.txt
  # The valid resource time window in seconds to delete the test resources. 6 hours
  VALID_RESOURCE_WINDOW: 6*60*60
  # The current GitHub action link
  ACTION_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  purge_azure_resources:
    name: Clean up unused Azure resources
    if: github.repository == 'radius-project/radius'
    runs-on: ubuntu-24.04
    # Deleting ACI nGroups synchronously before each resource group (see the delete
    # step) is slower than the previous fire-and-forget 'az group delete --no-wait',
    # so allow more time to work through a backlog. The purge is idempotent and runs
    # twice a day, so any groups not reached in one run are handled by the next.
    timeout-minutes: 30
    permissions:
      id-token: write
    steps:
      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_SP_TESTS_APPID }}
          tenant-id: ${{ secrets.AZURE_SP_TESTS_TENANTID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTIONID_TESTS }}

      - name: Find old test resource groups
        env:
          AZURE_SUBSCRIPTIONID_TESTS: ${{ secrets.AZURE_SUBSCRIPTIONID_TESTS }}
        run: |
          echo "## Test resource group list" >> $GITHUB_STEP_SUMMARY

          # Create the file to store the resource group list
          touch "${AZURE_RG_DELETE_LIST_FILE}"

          az account set -s "${AZURE_SUBSCRIPTIONID_TESTS}"
          resource_groups=$(az group list --query "[].{Name:name, creationTime:tags.creationTime}" -o tsv)

          current_time=$(date +%s)
          hours_ago=$((current_time - VALID_RESOURCE_WINDOW))
          while IFS=$'\t' read -r name creation_time; do
            if [[ ! "$name" =~ ^"samplestest-" ]] && [[ ! "$name" =~ ^"radtest-" ]] && [[ ! "$name" =~ ^"tfrg" ]]; then
              continue
            fi

            if [ "$creation_time" = "None" ]; then
              echo " * :wastebasket: $name - old resource"  >> $GITHUB_STEP_SUMMARY
              echo "$name" >> "${AZURE_RG_DELETE_LIST_FILE}"
              continue
            fi

            # Check if the resource group was created more than 6 hours ago
            if [ "$creation_time" -lt "$hours_ago" ]; then
              echo " * :wastebasket: $name - creationTime: $creation_time"  >> $GITHUB_STEP_SUMMARY
              echo "$name" >> "${AZURE_RG_DELETE_LIST_FILE}"
            else
              echo " * :white_check_mark: $name - creationTime: $creation_time"  >> $GITHUB_STEP_SUMMARY
            fi
          done <<< "$resource_groups"

      - name: Delete Azure resource groups
        run: |
          echo "## Deleting resource group list" >> "$GITHUB_STEP_SUMMARY"

          # Azure Container Instances 'nGroups' (container scale sets) are delegated
          # into the resource group's VNet subnet. A plain 'az group delete' deletes
          # resources in parallel and cannot remove the subnet while the nGroups still
          # reference it, so the whole resource group delete silently fails (--no-wait)
          # and leaves an empty-looking group behind whose only resource is the nGroups.
          # Delete the Container Instances resources first (nGroups before profiles) so
          # the resource group delete can then succeed.
          # Radius creates the ACI nGroups/containerGroupProfiles with this API version
          # (pkg/sdk/v20241101preview). A plain delete lets ARM pick the provider's
          # latest advertised version (e.g. 2026-06-01-preview), which the RP rejects
          # ("api-version not supported"), leaving the nGroups - and therefore the
          # whole resource group - undeletable. Delete them with the explicit version.
          aci_api_version="2024-11-01-preview"
          delete_rg() {
            line="$1"
            aci_ids=$(az resource list --resource-group "$line" \
              --query "[?starts_with(type, 'Microsoft.ContainerInstance/')].id" \
              --output tsv 2>/dev/null || true)
            for id in $(echo "$aci_ids" | grep -i '/nGroups/' || true); do
              echo "deleting $id"
              az resource delete --ids "$id" --api-version "${aci_api_version}" || true
            done
            for id in $(echo "$aci_ids" | grep -iv '/nGroups/' || true); do
              echo "deleting $id"
              az resource delete --ids "$id" --api-version "${aci_api_version}" || true
            done
            az group delete --resource-group "$line" --yes --verbose --no-wait || true
          }

          # Delete resource groups in parallel (capped) so a large backlog still fits
          # the job timeout.
          max_parallel=10
          while read -r line; do
              [ -z "$line" ] && continue
              echo " * $line" >> "$GITHUB_STEP_SUMMARY"
              delete_rg "$line" &
              while [ "$(jobs -r | wc -l)" -ge "${max_parallel}" ]; do wait -n; done
          done < "${AZURE_RG_DELETE_LIST_FILE}"
          wait

  purge_bicep_types:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      id-token: write # Required for azure/login
    steps:
      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.BICEPTYPES_CLIENT_ID }}
          tenant-id: ${{ secrets.BICEPTYPES_TENANT_ID }}
          subscription-id: ${{ secrets.BICEPTYPES_SUBSCRIPTION_ID }}

      # Delete Bicep types that are older than 30 days from the test registry
      - name: Delete test bicep type manifests
        run: |
          REPO_NAME="test/radius"
          REGISTRY_NAME="biceptypes"
          DATE="$(date -d '30 days ago' +%Y-%m-%d)"

          az acr manifest list-metadata \
            -r $REGISTRY_NAME \
            -n $REPO_NAME \
            --query "[?lastUpdateTime<='$DATE'].digest" \
            -o tsv | while read DIGEST; do
              az acr manifest delete \
                -n $REPO_NAME@$DIGEST \
                -r $REGISTRY_NAME --yes
          done

  create_issue_on_failure:
    name: Create issue for failing purge Azure test resources run
    needs: [purge_azure_resources, purge_bicep_types]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write # Required to create an issue when the scheduled run fails
    if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.issues.create({
              ...context.repo,
              title: `Purge Azure test resources failed - Run ID: ${context.runId}`,
              labels: ['test-failure'],
              body: `## Bug information \n\nThis bug is generated automatically if the purge Azure test resources workflow fails. For the further investigation, please visit [here](${process.env.ACTION_LINK}).`
            })
