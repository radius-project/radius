# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: PR Required Labels

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]
  # Required so this check reports in the merge queue. There is no PR to
  # validate on a merge_group event, so the label check step is skipped and the
  # job reports success. Scoped to main only so the release branch flow is
  # never affected.
  merge_group:
    branches:
      - main

permissions: {}

jobs:
  pr-required-labels:
    # Run on merge_group (no PR context) so the required check reports; otherwise
    # skip for Dependabot PRs.
    if: github.event_name == 'merge_group' || github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Run PR Required Labels
        if: github.event_name != 'merge_group'
        uses: mheap/github-action-required-labels@23e10fde7e062233401931a0eece796cd9bf3177 # v5.6.0
        with:
          mode: exactly
          count: 1
          labels: |
            pr:standard
            pr:important
          add_comment: ${{ github.event.pull_request.head.repo.fork == false }}
          message: |
            This PR requires {{ errorString }} {{ count }} of the following labels: {{ provided }}.
            Currently applied labels: {{ applied }}.

            **Label descriptions:**
            - `pr:important` - Major features, breaking changes, deprecations, or other high-impact changes that need special attention during release.
            - `pr:standard` - Ongoing maintenance, minor improvements, documentation updates, and routine development work.

            @${{ github.event.pull_request.user.login }}, please add the appropriate label to this PR before merging.
          exit_type: failure
