# Reusable workflow: Build static application graph artifact.
# Consumer repos call this workflow to build `rad` from the referenced Radius
# workflow source and run `rad graph build` with the exact branch-specific
# implementation they requested.
name: __build-app-graph

on:
  workflow_call:
    inputs:
      app_file:
        description: "Path to the Bicep application definition file"
        required: true
        type: string
        default: "app.bicep"
      orphan_branch:
        description: "Orphan branch name for storing graph artifacts (default: radius-graph)"
        required: false
        type: string
        default: "radius-graph"
      workflow_source_ref:
        description: "Ref in radius-project/radius to use when checking out workflow source and building rad"
        required: false
        type: string
        default: "main"

concurrency:
  group: build-app-graph-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Radius workflow source
        uses: actions/checkout@v4
        with:
          repository: radius-project/radius
          ref: ${{ inputs.workflow_source_ref }}
          path: .radius-workflow-src

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: .radius-workflow-src/go.mod
          cache-dependency-path: .radius-workflow-src/go.sum

      - name: Create bicepconfig for deployment
        run: |
          cat > bicepconfig.json << 'EOF'
          {
            "experimentalFeaturesEnabled": {
              "extensibility": true
            },
            "extensions": {
              "radius": "br:biceptypes.azurecr.io/radius:latest",
              "radiusCompute": "br:biceptypes.azurecr.io/radiuscompute:latest",
              "radiusData": "br:biceptypes.azurecr.io/radiusdata:latest",
              "radiusSecurity": "br:biceptypes.azurecr.io/radiussecurity:latest",
              "aws": "br:biceptypes.azurecr.io/aws:latest"
            }
          }
          EOF
          echo "bicepconfig.json created"
          cat bicepconfig.json

      - name: Build rad CLI from workflow source
        run: |
          cd .radius-workflow-src
          go build -o "$RUNNER_TEMP/rad" ./cmd/rad
          sudo mv "$RUNNER_TEMP/rad" /usr/local/bin/rad
          rad graph build --help >/dev/null

      - name: Install Bicep CLI
        run: |
          ./.radius-workflow-src/build/install-bicep.sh edge "$RUNNER_TEMP/radius-bicep" amd64
          echo "$RUNNER_TEMP/radius-bicep" >> "$GITHUB_PATH"
          if [ ! -f bicepconfig.json ]; then
            cp "$RUNNER_TEMP/radius-bicep/bicepconfig.json" ./bicepconfig.json
          fi
          "$RUNNER_TEMP/radius-bicep/bicep" --help >/dev/null

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
    
      - name: Build static graph
        run: |
          SOURCE_BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          rad graph build \
            --bicep "${{ inputs.app_file }}" \
            --orphan-branch "${{ inputs.orphan_branch }}" \
            --source-branch "$SOURCE_BRANCH"
