# Reusable workflow: Build static application graph artifact.
# Consumer repos call this workflow to install a released rad binary,
# run `rad graph build`, and commit .radius/static/app.json to the branch.
name: __build-app-graph

on:
  workflow_call:
    inputs:
      app_file:
        description: "Path to the Bicep application definition file"
        required: true
        type: string
        default: "app.bicep"
      artifact_path:
        description: "Path for the output graph artifact"
        required: true
        type: string
        default: ".radius/static/app.json"
      rad_version:
        description: "Version of the rad CLI to install (e.g., 'v0.40.0'). Defaults to latest."
        required: false
        type: string
        default: "latest"

concurrency:
  group: build-app-graph-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine rad version
        id: version
        run: |
          if [ "${{ inputs.rad_version }}" = "latest" ]; then
            RAD_VERSION=$(curl -fsSL https://api.github.com/repos/radius-project/radius/releases/latest | jq -r '.tag_name')
          else
            RAD_VERSION="${{ inputs.rad_version }}"
          fi
          echo "version=$RAD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install rad CLI
        run: |
          RAD_VERSION="${{ steps.version.outputs.version }}"
          curl -fsSL -o rad.tar.gz "https://github.com/radius-project/radius/releases/download/${RAD_VERSION}/rad-linux-amd64.tar.gz"
          tar -xzf rad.tar.gz
          sudo mv rad /usr/local/bin/rad
          rm -f rad.tar.gz
          rad version

      - name: Build static graph
        run: |
          mkdir -p "$(dirname "${{ inputs.artifact_path }}")"
          rad graph build --bicep "${{ inputs.app_file }}" --output "${{ inputs.artifact_path }}"

      - name: Commit graph artifact
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.artifact_path }}"
          git diff --cached --quiet || git commit -m "chore: update app graph artifact [skip ci]"
          git push
