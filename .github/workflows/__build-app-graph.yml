# Reusable workflow: Build static application graph artifact.
# Consumer repos call this workflow to run `rad graph build` using a released
# CLI when available, or a CLI built from the referenced Radius workflow source
# when the requested release does not yet include the graph command.
name: __build-app-graph

on:
  workflow_call:
    inputs:
      app_file:
        description: "Path to the Bicep application definition file"
        required: true
        type: string
        default: "app.bicep"
      orphan_branch:
        description: "Orphan branch name for storing graph artifacts (default: radius-graph)"
        required: false
        type: string
        default: "radius-graph"
      workflow_source_ref:
        description: "Ref in radius-project/radius to use when checking out workflow source for fallback rad builds"
        required: false
        type: string
        default: "main"
      rad_version:
        description: "Version of the rad CLI to install (e.g., 'v0.40.0'). Defaults to latest."
        required: false
        type: string
        default: "latest"

concurrency:
  group: build-app-graph-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-graph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Radius workflow source
        uses: actions/checkout@v4
        with:
          repository: radius-project/radius
          ref: ${{ inputs.workflow_source_ref }}
          path: .radius-workflow-src

      - name: Determine rad version
        id: version
        run: |
          if [ "${{ inputs.rad_version }}" = "latest" ]; then
            RAD_VERSION=$(curl -fsSL https://api.github.com/repos/radius-project/radius/releases/latest | jq -r '.tag_name')
          else
            RAD_VERSION="${{ inputs.rad_version }}"
          fi
          echo "version=$RAD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install released rad CLI
        continue-on-error: true
        run: |
          RAD_VERSION="${{ steps.version.outputs.version }}"
          curl -fsSL -o rad.tar.gz "https://github.com/radius-project/radius/releases/download/${RAD_VERSION}/rad-linux-amd64.tar.gz"
          tar -xzf rad.tar.gz
          sudo mv rad /usr/local/bin/rad
          rm -f rad.tar.gz
          rad version

      - name: Check released rad graph support
        id: released-rad
        run: |
          if command -v rad >/dev/null 2>&1 && rad graph build --help >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.released-rad.outputs.available != 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: .radius-workflow-src/go.mod
          cache-dependency-path: .radius-workflow-src/go.sum

      - name: Build rad CLI from workflow source
        if: steps.released-rad.outputs.available != 'true'
        run: |
          cd .radius-workflow-src
          go build -o "$RUNNER_TEMP/rad" ./cmd/rad
          sudo mv "$RUNNER_TEMP/rad" /usr/local/bin/rad
          rad graph build --help >/dev/null

      - name: Install Bicep CLI
        run: |
          ./.radius-workflow-src/build/install-bicep.sh edge "$RUNNER_TEMP/radius-bicep" amd64
          echo "$RUNNER_TEMP/radius-bicep" >> "$GITHUB_PATH"
          if [ ! -f bicepconfig.json ]; then
            cp "$RUNNER_TEMP/radius-bicep/bicepconfig.json" ./bicepconfig.json
          fi
          "$RUNNER_TEMP/radius-bicep/bicep" --help >/dev/null

      - name: Build static graph
        run: |
          SOURCE_BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          rad graph build \
            --bicep "${{ inputs.app_file }}" \
            --orphan-branch "${{ inputs.orphan_branch }}" \
            --source-branch "$SOURCE_BRANCH"
