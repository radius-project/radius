# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Purge test container images

on:
  # Enable manual trigger
  workflow_dispatch:
  schedule:
    # Run twice a day
    - cron: 30 0,12 * * *

env:
  ACTION_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

permissions: {}

jobs:
  purge_ghcr_dev:
    name: Delete old unused test container images
    if: github.repository == 'radius-project/radius'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions: {}
    steps:
      # Generate a short-lived GitHub App installation token scoped to the
      # radius-project organization with packages:write. App tokens expire after one hour and are
      # least-privilege (packages only), reducing the blast radius if leaked.
      #
      # Requires the App's credentials to be configured on radius-project/radius:
      #   - secrets.RADIUS_PURGE_BOT_CLIENT_ID
      #   - secrets.RADIUS_PURGE_BOT_PRIVATE_KEY
      # and the App installed on the radius-project org with the "Packages:
      # Read and write" repository permission.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RADIUS_PURGE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RADIUS_PURGE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-packages: write

      - name: Delete 'dev' containers older than a week
        uses: snok/container-retention-policy@d3bdcf5ce9b05f685154e4a16c39233b245e3d53 # v3.1.0
        with:
          account: ${{ github.repository_owner }}
          token: ${{ steps.app-token.outputs.token }}
          image-names: dev/*
          image-tags: pr-*
          cut-off: 1w

  create_issue_on_failure:
    name: Create issue for failing purge old images resources run
    if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
    needs: [purge_ghcr_dev]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write # Required to create an issue when the scheduled run fails
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ github.token }}
          script: |
            github.rest.issues.create({
              ...context.repo,
              title: `Purge old images failed - Run ID: ${context.runId}`,
              labels: ['test-failure'],
              body: `## Bug information \n\nThis bug is generated automatically if the purge old images workflow fails. For further investigation, please visit [here](${process.env.ACTION_LINK}).`
            })
