# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Publish Deployment Engine Image

on:
  workflow_dispatch:
    inputs:
      src_image:
        description: Source image in ACR (e.g. radiusdeploymentengine.azurecr.io/deployment-engine)
        required: true
      dest_image:
        description: Destination image in GHCR (e.g. ghcr.io/radius-project/deployment-engine)
        required: true
      tag:
        description: Tag for the image (e.g. 1.0)
        required: true
  repository_dispatch:
    types: [deployment-engine.publish]
    # Expected client_payload:
    #   src_image: Source image in ACR (e.g. radiusdeploymentengine.azurecr.io/deployment-engine)
    #   dest_image: Destination image in GHCR (e.g. ghcr.io/radius-project/deployment-engine)
    #   tag: Tag for the image (e.g. 1.0)

permissions: {}

jobs:
  dispatch-publish:
    name: Dispatch DE image publish
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: publish-de-image
    permissions:
      contents: read # Required for actions/checkout
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Capture payload
        id: payload
        shell: bash
        env:
          SRC_IMAGE: ${{ github.event.client_payload.src_image || github.event.inputs.src_image }}
          DEST_IMAGE: ${{ github.event.client_payload.dest_image || github.event.inputs.dest_image }}
          TAG: ${{ github.event.client_payload.tag || github.event.inputs.tag }}
        run: |
          {
            echo "src_image=${SRC_IMAGE}"
            echo "dest_image=${DEST_IMAGE}"
            echo "tag=${TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Get App Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: get-token
        with:
          app-id: ${{ secrets.RADIUS_PUBLISHER_BOT_APP_ID }}
          private-key: ${{ secrets.RADIUS_PUBLISHER_BOT_PRIVATE_KEY }}
          permission-metadata: read
          permission-actions: read
          permission-contents: write
          owner: azure-octo
          repositories: |
            radius-publisher

      - name: Capture dispatch start time
        id: dispatch-start
        shell: bash
        run: |
          echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.get-token.outputs.token }}
          repository: azure-octo/radius-publisher
          event-type: deployment-engine
          client-payload: |-
            {
              "source_repository": "${{ github.repository }}",
              "src_image": "${{ steps.payload.outputs.src_image }}",
              "dest_image": "${{ steps.payload.outputs.dest_image }}",
              "tag": "${{ steps.payload.outputs.tag }}"
            }

      - name: Monitor remote workflow
        id: monitor-remote-workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.get-token.outputs.token }}
          script: |
            const { default: script } = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/monitor-remote-workflow.mjs`)
            await script({context, github, core})
        env:
          INPUT_OWNER: azure-octo
          INPUT_REPO: radius-publisher
          INPUT_WORKFLOW_FILE: publish-deployment-engine.yml
          INPUT_DISPATCH_STARTED_AT: ${{ steps.dispatch-start.outputs.started_at }}
          INPUT_MAX_WAIT_SECONDS: "600"
          INPUT_POLL_INTERVAL_SECONDS: "15"

      - name: Show failed logs
        if: failure() && steps.monitor-remote-workflow.outputs.run_id != ''
        shell: bash
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
        run: |
          gh run view "${{ steps.monitor-remote-workflow.outputs.run_id }}" --repo azure-octo/radius-publisher --log-failed || true
