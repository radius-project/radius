---
name: Spellcheck

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  spellcheck:
    uses: radius-project/.github/.github/workflows/__spellcheck.yml@main
    permissions:
      contents: read
      pull-requests: write
