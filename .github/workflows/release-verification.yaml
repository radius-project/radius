# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Release verification

on:
  workflow_dispatch:
    inputs:
      version:
        description: Radius version number to use (e.g. 0.1.0, 0.1.0-rc1)
        required: true
        default: ""
        type: string

permissions: {}

jobs:
  release-verification:
    if: github.repository == 'radius-project/radius'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Ensure inputs.version is valid semver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          python ./.github/scripts/validate_semver.py "${INPUT_VERSION}"

      - name: Run release verification
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          ./.github/scripts/release-verification.sh "${INPUT_VERSION}"
