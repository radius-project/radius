# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Check code is up-to-date

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - release/*
  # Revalidate the combined changes when a PR is queued in the merge queue.
  # Scoped to main only so the release branch flow is never affected.
  merge_group:
    branches:
      - main

concurrency:
  # Cancel the previously triggered build for only PR build.
  group: lint-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: Changes
    uses: ./.github/workflows/__changes.yml
    permissions:
      contents: read
      pull-requests: read

  linter_check:
    name: Lint
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.only_changed != 'true'
    timeout-minutes: 15
    env:
      GOPROXY: https://proxy.golang.org
      HELM_CHARTS_DIR: deploy/Chart
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          cache: true

      - name: Setup NodeJS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Install yq
        # Required by make generate-bicep-types-contrib to parse defaults.yaml.
        run: make install-yq

      - name: Install helm
        # Version pinned in build/tools.mk (HELM_VERSION).
        run: make install-helm

      - name: Run Helm linter
        run: |
          helm lint "${HELM_CHARTS_DIR}"

      - name: Run Helm unit tests
        run: make test-helm

      - name: Run TypeSpec format check
        run: make tsp-format-check

      - name: Run linter
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version-file: .golangci-lint-version
          args: --timeout=10m
          skip-cache: true
          install-mode: binary

      - name: Run make generate
        run: make generate

      - name: Check if generated code is up to date
        continue-on-error: true
        id: gitdiff
        run: |
          git diff --exit-code

      - name: Check failures
        if: steps.gitdiff.outcome != 'success'
        run: |
          echo "Generated code is not up to date, run 'make generate' to update generated code."
          exit 1

  format-check:
    name: Format check with Prettier
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.only_changed != 'true'
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup NodeJS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Run `make format-check`
        id: format-check
        continue-on-error: true
        run: |
          make format-check

      - name: Check for formatting failures
        if: steps.format-check.outcome == 'failure'
        run: |
          echo "Format check failed. Please fix the formatting issues. You can run 'make format-write' to update the code."
          exit 1
