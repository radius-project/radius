# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Build and Test

on:
  # Enable manual trigger
  workflow_dispatch:
  push:
    branches:
      - main
      - release/*
    tags:
      - v*
  pull_request:
    branches:
      - main
      - features/*
      - release/*
  # Revalidate the combined changes when a PR is queued in the merge queue.
  # Scoped to main only so the release branch flow is never affected.
  merge_group:
    branches:
      - main

permissions: {}

concurrency:
  # Cancel the previously triggered build for only PR build.
  group: build-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  # GitHub Actor for pushing images to GHCR
  GHCR_ACTOR: rad-ci-bot

  # Container registry url for GitHub container registry.
  CONTAINER_REGISTRY: ghcr.io/radius-project

  # Local file path to the release binaries.
  RELEASE_PATH: ./release

  # URL to get source code for building the image
  IMAGE_SRC: https://github.com/radius-project/radius

jobs:
  changes:
    name: Changes
    uses: ./.github/workflows/__changes.yml
    permissions:
      contents: read
      pull-requests: read

  build-and-push-cli:
    name: Build ${{ matrix.target_os }}_${{ matrix.target_arch }} binaries
    needs: [changes]
    # if: github.repository == 'radius-project/radius' && needs.changes.outputs.only_changed != 'true'
    if: github.repository == 'radius-project/radius'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      packages: write # Required for uploading the package
      contents: read # Required for actions/checkout
      issues: read # Required for EnricoMi/publish-unit-test-result-action
      checks: write # Required for EnricoMi/publish-unit-test-result-action
      pull-requests: write # Required for EnricoMi/publish-unit-test-result-action
    env:
      GOOS: ${{ matrix.target_os }}
      GOARCH: ${{ matrix.target_arch }}
      GOPROXY: https://proxy.golang.org
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: linux
            target_arch: amd64
          - target_os: linux
            target_arch: arm64
          - target_os: linux
            target_arch: arm
          - target_os: windows
            target_arch: amd64
          - target_os: darwin
            target_arch: amd64
          - target_os: darwin
            target_arch: arm64
    steps:
      - name: Checkout
        if: needs.changes.outputs.only_changed != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        if: needs.changes.outputs.only_changed != 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          cache: true

      - name: Setup Python
        if: needs.changes.outputs.only_changed != 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Parse release version and set environment variables
        if: needs.changes.outputs.only_changed != 'true'
        run: python ./.github/scripts/get_release_version.py

      - name: Make build
        if: needs.changes.outputs.only_changed != 'true'
        run: make build

      - name: Copy cli binaries to release (unix-like)
        if: matrix.target_os != 'windows' && needs.changes.outputs.only_changed != 'true'
        run: |
          mkdir -p "${RELEASE_PATH}"
          cp "./dist/${GOOS}_${GOARCH}/release/rad" "${RELEASE_PATH}/rad_${GOOS}_${GOARCH}"

      - name: Copy cli binaries to release (windows)
        if: matrix.target_os == 'windows' && needs.changes.outputs.only_changed != 'true'
        run: |
          mkdir -p "${RELEASE_PATH}"
          cp "./dist/${GOOS}_${GOARCH}/release/rad.exe" "${RELEASE_PATH}/rad_${GOOS}_${GOARCH}.exe"

      - name: Upload CLI binary
        if: needs.changes.outputs.only_changed != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rad_cli_${{ matrix.target_os}}_${{ matrix.target_arch}}
          path: ${{ env.RELEASE_PATH }}

      - name: Login to GitHub Container Registry
        if: needs.changes.outputs.only_changed != 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Install oras
        if: needs.changes.outputs.only_changed != 'true'
        # Version pinned in build/tools.mk (ORAS_VERSION).
        run: make install-oras

      - name: Push latest rad cli binary to GHCR (unix-like)
        if: github.ref == 'refs/heads/main' && matrix.target_os != 'windows' && needs.changes.outputs.only_changed != 'true'
        run: |
          cp "./dist/${GOOS}_${GOARCH}/release/rad" ./rad
          oras push "${CONTAINER_REGISTRY}/rad/${GOOS}-${GOARCH}:latest" ./rad --annotation "org.opencontainers.image.source=${IMAGE_SRC}"

      - name: Copy cli binaries to release (windows)
        if: github.ref == 'refs/heads/main' && matrix.target_os == 'windows' && needs.changes.outputs.only_changed != 'true'
        run: |
          cp "./dist/${GOOS}_${GOARCH}/release/rad.exe" ./rad.exe
          oras push "${CONTAINER_REGISTRY}/rad/${GOOS}-${GOARCH}:latest" ./rad.exe --annotation "org.opencontainers.image.source=${IMAGE_SRC}"

      - name: Skip
        if: needs.changes.outputs.only_changed == 'true'
        run: exit 0

  # Returns success if all matrix jobs in build-and-push-cli are successful - otherwise, it returns a failure.
  # Use this as a PR status check for GitHub Policy Service instead of individual matrix entry checks.
  build-check:
    if: always()
    name: Build Check
    needs: [build-and-push-cli]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check build matrix results
        if: ${{ needs.build-and-push-cli.result != 'success' && needs.build-and-push-cli.result != 'skipped' }}
        run: |
          echo "::error::Build and push CLI jobs failed or were cancelled"
          exit 1

      - name: Build matrix succeeded
        if: ${{ needs.build-and-push-cli.result == 'success' || needs.build-and-push-cli.result == 'skipped' }}
        run: |
          echo "All build matrix jobs completed successfully"
          exit 0

  build-and-push-images:
    name: Build and publish container images
    needs: [changes]
    if: github.repository == 'radius-project/radius' && needs.changes.outputs.only_changed != 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      packages: write # Required for uploading the package
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Parse release version and set environment variables
        run: python ./.github/scripts/get_release_version.py

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          cache: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Build container images (PR)
        if: github.event_name == 'pull_request'
        run: |
          make docker-build
        env:
          DOCKER_REGISTRY: ${{ env.CONTAINER_REGISTRY }}/dev
          DOCKER_TAG_VERSION: ${{ env.REL_VERSION }}
          DOCKER_CACHE_GHA: 1

      - name: Save container images to artifacts (PR)
        if: github.event_name == 'pull_request'
        run: |
          make docker-save-images
        env:
          DOCKER_REGISTRY: ${{ env.CONTAINER_REGISTRY }}/dev
          DOCKER_TAG_VERSION: ${{ env.REL_VERSION }}

      - name: Upload container image artifacts (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-images-${{ env.REL_VERSION }}
          path: ./dist/images/
          retention-days: 1

      - name: Push container images (latest)
        run: |
          make docker-multi-arch-push
        if: (github.ref == 'refs/heads/main') # push image to latest on merge to main
        env:
          DOCKER_REGISTRY: ${{ env.CONTAINER_REGISTRY }}
          DOCKER_TAG_VERSION: latest
          DOCKER_CACHE_GHA: 1

      - name: Push container images (release)
        run: |
          make docker-multi-arch-push
        if: startsWith(github.ref, 'refs/tags/v') # push image on tag
        env:
          DOCKER_REGISTRY: ${{ env.CONTAINER_REGISTRY }}
          DOCKER_TAG_VERSION: ${{ env.REL_CHANNEL }}
          DOCKER_CACHE_GHA: 1

      - name: Collect build metrics
        if: always()
        run: |
          make build-metrics
          cat dist/metrics/metrics.txt >> $GITHUB_STEP_SUMMARY
        env:
          DOCKER_REGISTRY: ${{ github.event_name == 'pull_request' && format('{0}/dev', env.CONTAINER_REGISTRY) || env.CONTAINER_REGISTRY }}
          DOCKER_TAG_VERSION: ${{ github.event_name == 'pull_request' && env.REL_VERSION || (github.ref == 'refs/heads/main' && 'latest' || env.REL_CHANNEL) }}

      - name: Upload build metrics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-metrics-${{ github.job }}
          path: dist/metrics/

  build-and-push-helm-chart:
    name: Helm chart build
    # Don't push on PR, agent will not have permission.
    if: github.repository == 'radius-project/radius' && ((startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) && needs.changes.outputs.only_changed != 'true'
    needs: [build-and-push-images, changes]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      packages: write # Required for uploading the package
      contents: read
    env:
      ARTIFACT_DIR: ./dist/Charts
      HELM_PACKAGE_DIR: helm
      HELM_CHARTS_DIR: deploy/Chart
      OCI_REGISTRY: ghcr.io
      # We only push the chart on pushes to main or to a tag. The versioning logic will select the right
      # version for us.
      OCI_REPOSITORY: radius-project/helm-chart
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install helm
        # Version pinned in build/tools.mk (HELM_VERSION).
        run: make install-helm

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Parse release version and set environment variables
        run: python ./.github/scripts/get_release_version.py

      - name: Run Helm linter
        run: |
          helm lint "${HELM_CHARTS_DIR}"

      - name: Package Helm chart
        run: |
          mkdir -p "${ARTIFACT_DIR}/${HELM_PACKAGE_DIR}"
          helm package "${HELM_CHARTS_DIR}" --version "${CHART_VERSION}" --app-version "${REL_VERSION}" --destination "${ARTIFACT_DIR}/${HELM_PACKAGE_DIR}"

      - name: Push helm chart to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          echo "${GH_TOKEN}" | helm registry login -u "${GH_ACTOR}" --password-stdin "${OCI_REGISTRY}"
          helm push "${ARTIFACT_DIR}/${HELM_PACKAGE_DIR}/radius-${CHART_VERSION}.tgz" "oci://${OCI_REGISTRY}/${OCI_REPOSITORY}"

  build-and-push-bicep-types:
    name: Dispatch Bicep Types publish
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [changes]
    if: github.repository == 'radius-project/radius' && needs.changes.outputs.only_changed != 'true' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    environment: publish-bicep
    permissions:
      contents: read # Required for actions/checkout
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Parse release version and set environment variables
        run: python ./.github/scripts/get_release_version.py

      - name: Get App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: get-token
        with:
          client-id: ${{ secrets.RADIUS_PUBLISHER_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RADIUS_PUBLISHER_BOT_PRIVATE_KEY }}
          permission-metadata: read
          permission-actions: read
          permission-contents: write
          owner: azure-octo
          repositories: |
            radius-publisher

      - name: Capture dispatch start time
        id: dispatch-start
        shell: bash
        run: |
          echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Repository Dispatch
        id: repository-dispatch
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.get-token.outputs.token }}
          repository: azure-octo/radius-publisher
          event-type: bicep-types
          client-payload: |-
            {
              "source_repository": "${{ github.repository }}",
              "source_ref": "${{ github.ref }}",
              "source_sha": "${{ github.sha }}",
              "rel_channel": "${{ env.REL_CHANNEL }}",
              "registry_target": "radius"
            }

      - name: Monitor remote workflow
        id: monitor-remote-workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.get-token.outputs.token }}
          script: |
            const { default: script } = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/monitor-remote-workflow.mjs`)
            await script({context, github, core})
        env:
          INPUT_OWNER: azure-octo
          INPUT_REPO: radius-publisher
          INPUT_WORKFLOW_FILE: publish-bicep-types.yml
          INPUT_DISPATCH_STARTED_AT: ${{ steps.dispatch-start.outputs.started_at }}
          INPUT_MAX_WAIT_SECONDS: "600"
          INPUT_POLL_INTERVAL_SECONDS: "15"

      - name: Show failed logs
        if: failure() && steps.monitor-remote-workflow.outputs.run_id != ''
        shell: bash
        env:
          GH_TOKEN: ${{ steps.get-token.outputs.token }}
          RUN_ID: ${{ steps.monitor-remote-workflow.outputs.run_id }}
        run: |
          gh run view "${RUN_ID}" --repo azure-octo/radius-publisher --log-failed || true

  publish-release:
    name: Publish GitHub Release
    needs: [changes, build-and-push-cli]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.repository == 'radius-project/radius' && startsWith(github.ref, 'refs/tags/v') && needs.changes.outputs.only_changed != 'true'
    permissions:
      contents: write # Required for creating releases
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Parse release version and set environment variables
        run: python ./.github/scripts/get_release_version.py

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: rad_cli_*
          merge-multiple: true
          path: ${{ env.RELEASE_PATH }}

      - name: generate checksum files
        run: |
          cd "${RELEASE_PATH}" && for i in *; do sha256sum -b "$i" > "$i.sha256"; done && cd -
          ls -l "${RELEASE_PATH}"

      - name: Create GitHub RC Release (pre-release and auto-generate release notes)
        if: ${{ contains(env.REL_VERSION, 'rc') }}
        run: |
          gh release create "v${REL_VERSION}" \
            "${RELEASE_PATH}"/* \
            --title "Radius v${REL_VERSION}" \
            --generate-notes \
            --verify-tag \
            --prerelease
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Official Release
        if: ${{ !contains(env.REL_VERSION, 'rc') }}
        run: |
          gh release create "v${REL_VERSION}" \
            "${RELEASE_PATH}"/* \
            --title "Radius v${REL_VERSION}" \
            --notes-file "docs/release-notes/v${REL_VERSION}.md" \
            --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}

  # Comprehensive build summary that checks all critical build jobs.
  # Use this as the required status check in PR branch protection rules.
  build-summary:
    if: always()
    name: Build Summary
    needs: [build-check, build-and-push-images, build-and-push-bicep-types]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check all build jobs
        run: |
          results=(
            "build-check:${BUILD_CHECK_RESULT}"
            "build-and-push-images:${BUILD_AND_PUSH_IMAGES_RESULT}"
            "build-and-push-bicep-types:${BUILD_AND_PUSH_BICEP_TYPES_RESULT}"
          )

          echo "## Build Results Summary" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Job | Status |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|-----|--------|" >> "${GITHUB_STEP_SUMMARY}"

          failed=0
          for result in "${results[@]}"; do
            job="${result%%:*}"
            status="${result##*:}"

            if [ "$status" = "success" ] || [ "$status" = "skipped" ]; then
              echo "| $job | ✅ $status |" >> "${GITHUB_STEP_SUMMARY}"
            else
              echo "| $job | ❌ $status |" >> "${GITHUB_STEP_SUMMARY}"
              failed=1
            fi
          done

          echo "" >> "${GITHUB_STEP_SUMMARY}"

          if [ $failed -eq 1 ]; then
            echo "::error::One or more build jobs failed or were cancelled"
            echo "**Result: ❌ BUILD FAILED**" >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          else
            echo "**Result: ✅ ALL BUILDS PASSED**" >> "${GITHUB_STEP_SUMMARY}"
            echo "All build jobs completed successfully"
          fi
        env:
          BUILD_CHECK_RESULT: ${{ needs.build-check.result }}
          BUILD_AND_PUSH_IMAGES_RESULT: ${{ needs.build-and-push-images.result }}
          BUILD_AND_PUSH_BICEP_TYPES_RESULT: ${{ needs.build-and-push-bicep-types.result }}
