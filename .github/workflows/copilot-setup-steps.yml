# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
# This workflow provisions the development environment for the GitHub Copilot
# coding agent (Cloud Agent). It mirrors the dev container defined in
# .devcontainer/devcontainer.json and .devcontainer/post-create.sh so that an
# agent gets the same turnkey setup a human contributor gets.
#
# IMPORTANT: Keep this file in sync with .devcontainer/devcontainer.json and
# .devcontainer/post-create.sh. Tool versions are read from the same version
# files (go.mod, .node-version, .python-version, .golangci-lint-version) so a
# version bump in one place flows to both the dev container and this workflow.
name: copilot-setup-steps

on:
  workflow_dispatch:
  # Run on changes to the setup so it can be validated before the agent uses it.
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/post-create.sh
      - .node-version
      - .python-version
      - .golangci-lint-version
      - go.mod
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .devcontainer/post-create.sh
      - .node-version
      - .python-version
      - .golangci-lint-version
      - go.mod

permissions: {}

jobs:
  # The job MUST be named `copilot-setup-steps` for the Copilot coding agent to
  # discover and run it. See
  # https://docs.github.com/en/copilot/how-tos/use-copilot-agents/cloud-agent/customize-the-agent-environment
  copilot-setup-steps:
    name: Copilot setup steps
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      # Required so the setup steps can check out the repository.
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          cache: true

      - name: Setup NodeJS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Run post-create setup
        run: .devcontainer/post-create.sh
