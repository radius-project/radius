# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
# This workflow provisions the development environment for the GitHub Copilot
# coding agent (Cloud Agent). It is a self-contained, full setup: it installs
# every language runtime and tool the agent needs to build, generate, lint, and
# test Radius without relying on the dev container or its post-create script.
#
# The steps below intentionally mirror the tooling installed by the contributor
# dev container (.devcontainer/) and by the CI workflows (build.yaml and
# functional-test-noncloud.yaml). Language runtime versions are read from the
# repo's version files (go.mod, .node-version, .python-version, .terraform-version)
# so a version bump flows here automatically; CLI tool versions and checksums are
# pinned in build/tools.mk and installed via the shared `make install-<tool>`
# targets. Versions are NOT declared in a workflow-level `env:`
# block because the Copilot coding agent replays these steps in a harness that
# does not provide that context.
name: copilot-setup-steps

on:
  workflow_dispatch:
  # Run on changes to the setup so it can be validated before the agent uses it.
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .node-version
      - .python-version
      - .terraform-version
      - build/tools.mk
      - build/scripts/install-*.sh
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .node-version
      - .python-version
      - .terraform-version
      - build/tools.mk
      - build/scripts/install-*.sh

permissions: {}

# NOTE: Tool versions are pinned inline in each step below rather than in a
# workflow-level `env:` block. When the Copilot coding agent provisions its
# environment, it only honors a fixed allow-list of `copilot-setup-steps` job
# settings (`steps`, `permissions`, `runs-on`, `services`, `snapshot`,
# `timeout-minutes`); anything else -- including a job/workflow-level `env:`
# block -- is ignored. As a result `${{ env.X }}` and env vars inherited from
# such a block resolve to empty when the agent runs these steps.
# See: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment
# Language runtime versions read from repo version files (go.mod, .node-version,
# .python-version, .terraform-version) still work because the steps read the files
# directly; CLI tool versions come from build/tools.mk via `make install-<tool>`.

jobs:
  # The job MUST be named `copilot-setup-steps` for the Copilot coding agent to
  # discover and run it. See
  # https://docs.github.com/en/copilot/how-tos/use-copilot-agents/cloud-agent/customize-the-agent-environment
  copilot-setup-steps:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      # Required so the setup steps can check out the repository.
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Configure git safe directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Install helm
        # Version pinned in build/tools.mk (HELM_VERSION).
        run: make install-helm

      - name: Install kubectl
        # Version pinned in build/tools.mk (KUBECTL_VERSION).
        run: make install-kubectl

      - name: Install pnpm and TypeSpec tooling
        # `make generate-tsp-installed` enables corepack with the pinned pnpm
        # version and installs the TypeSpec toolchain in the typespec/ workspace,
        # warming the cache for the TypeSpec -> OpenAPI -> Go generation pipeline.
        run: make generate-tsp-installed

      - name: Configure pnpm global bin directory
        # pnpm requires its global bin directory to exist and be on PATH before
        # installing global packages. Pin the bin dir to PNPM_HOME (otherwise it
        # defaults to ${PNPM_HOME}/bin, which would not be on PATH) and persist
        # both via GITHUB_ENV and GITHUB_PATH so subsequent steps inherit them.
        run: |
          PNPM_HOME="${RUNNER_TEMP}/pnpm"
          mkdir -p "${PNPM_HOME}"
          pnpm config set global-bin-dir "${PNPM_HOME}"
          echo "PNPM_HOME=${PNPM_HOME}" >> "${GITHUB_ENV}"
          echo "${PNPM_HOME}" >> "${GITHUB_PATH}"

      - name: Install cspell
        # Spell-check tooling used by `make spellcheck`, which requires `cspell`
        # on PATH (provided by the pnpm global bin directory configured above).
        run: |
          pnpm add -g cspell
          cspell --version

      - name: Install golangci-lint
        # Pinned version + checksums live in build/tools.mk (GOLANGCI_LINT_VERSION).
        run: make install-golangci-lint

      - name: Install Delve (dlv)
        # controller-gen, mockgen, and gotestsum are managed as Go tool dependencies
        # (the 'tool' directives in go.mod) and run via `go tool`, so they need no
        # separate install. dlv (Delve) is used by the process-debugging workflow
        # (make debug-*). Version pinned in build/tools.mk (DLV_VERSION).
        run: make install-dlv

      - name: Install yq
        # Required by Bicep type generation to parse YAML defaults.
        run: make install-yq

      - name: Install KinD
        # Lets the agent create a local Kubernetes cluster for integration and
        # functional tests. Version pinned in build/tools.mk (KIND_VERSION).
        run: make install-kind

      - name: Install k3d
        # Used by the local debug environment (make debug-start) to create a
        # lightweight Kubernetes cluster. Version pinned in build/tools.mk (K3D_VERSION).
        run: make install-k3d

      - name: Install stern
        # Multi-pod log tailing for debugging Kubernetes output across the
        # radius-system components. Version pinned in build/tools.mk (STERN_VERSION).
        run: make install-stern

      - name: Install Dapr CLI
        # Version pinned in build/tools.mk (DAPR_VERSION).
        run: make install-dapr

      - name: Install Terraform
        # Version defaults to .terraform-version (overridable via TERRAFORM_VERSION)
        # and is compiled into the rad binary; checksums pinned in build/tools.mk.
        run: make install-terraform

      - name: Install Bicep CLI
        # Required by Bicep type publishing (make publish-bicep-extension) and
        # rad bicep flows. Pinned version + checksum live in build/tools.mk.
        run: make install-bicep

      - name: Install PostgreSQL client
        # psql is used by the debug environment to verify control-plane database
        # connectivity.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client
          psql --version
