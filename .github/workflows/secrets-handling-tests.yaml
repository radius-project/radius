# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Secrets Handling Tests

# Focused, fast-feedback CI for the recipe secret input/output handling feature. The full unit-test
# suite (unit-tests.yaml -> `make test`) still covers these packages; this workflow runs only when
# the secret-handling code paths change so contributors get quick, targeted signal. The test logic
# lives in the `test-secrets` Make target so it runs identically on developer machines and in CI.
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release/*
    paths:
      - pkg/schema/**
      - pkg/resourceutil/**
      - pkg/recipes/**
      - pkg/corerp/api/v20250801preview/**
      - pkg/corerp/datamodel/**
      - pkg/dynamicrp/**
      - build/test.mk
      - .github/workflows/secrets-handling-tests.yaml
  pull_request:
    branches:
      - main
      - features/*
      - release/*
    paths:
      - pkg/schema/**
      - pkg/resourceutil/**
      - pkg/recipes/**
      - pkg/corerp/api/v20250801preview/**
      - pkg/corerp/datamodel/**
      - pkg/dynamicrp/**
      - build/test.mk
      - .github/workflows/secrets-handling-tests.yaml

concurrency:
  # Cancel the previously triggered run for the same ref; only one run per PR/branch is useful.
  group: secrets-handling-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-secrets:
    name: Run secret-handling unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          cache: true

      - name: Run secret-handling tests
        # `make test-secrets` runs go vet and the unit tests for the secret-handling packages. It
        # deliberately avoids cluster tooling (KUBEBUILDER_ASSETS / helm) so it stays fast and is
        # runnable locally with the same command.
        run: make test-secrets
