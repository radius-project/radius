# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Validate Bicep Code

on:
  # Enable manual trigger
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - release/*
  # Revalidate the combined changes when a PR is queued in the merge queue.
  # Scoped to main only so the release branch flow is never affected.
  merge_group:
    branches:
      - main

env:
  # Local Docker registry name
  LOCAL_REGISTRY_NAME: radius-registry
  # Local Docker registry server
  LOCAL_REGISTRY_SERVER: localhost
  # Local Docker registry port
  LOCAL_REGISTRY_PORT: "5000"

concurrency:
  # Cancel the previously triggered build for only PR build.
  group: bicep-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: Changes
    uses: ./.github/workflows/__changes.yml
    permissions:
      contents: read
      pull-requests: read

  build:
    name: Validate Bicep Code
    if: needs.changes.outputs.only_changed != 'true'
    needs: [changes]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install bicep CLI
        # Install into ~/.rad/bin so the rad CLI finds it; the script also adds
        # the dir to PATH for subsequent steps. Pinned version + checksum live in
        # build/tools.mk.
        run: make install-bicep BICEP_INSTALL_DIR="$HOME/.rad/bin"

      - name: Create a temporary file system
        run: |
          mkdir -p tmp-radius-bicep-extension
          mkdir -p tmp-testresources-bicep-extension

      # The two publish-extension commands are independent: they write to separate
      # output files (tmp-radius-bicep-extension/radius.tgz and
      # tmp-testresources-bicep-extension/testresources.tgz, both created above).
      # Running them as a parallel group overlaps the slow `go run` compile of the
      # testresources publisher with the Bicep publish. The implicit wait at the
      # end of the group ensures both finish before bicepconfig.json is modified.
      - parallel:
          - name: Publish bicep types
            run: |
              bicep publish-extension ./hack/bicep-types-radius/generated/index.json --target ./tmp-radius-bicep-extension/radius.tgz --force

          - name: Publish testresources extension
            run: |
              go run ./cmd/rad/main.go bicep publish-extension -f ./test/functional-portable/dynamicrp/noncloud/resources/testdata/testresourcetypes.yaml --target ./tmp-testresources-bicep-extension/testresources.tgz --force

      - name: Install jq
        # Pinned version + checksums live in build/tools.mk (JQ_VERSION).
        run: make install-jq

      - name: Modify bicepconfig.json
        run: |
          # Update bicepconfig.json with paths for extensions
          jq \
            --arg rad "$GITHUB_WORKSPACE/tmp-radius-bicep-extension/radius.tgz" \
            --arg test "$GITHUB_WORKSPACE/tmp-testresources-bicep-extension/testresources.tgz" \
            '.extensions.radius = $rad | .extensions.testresources = $test' \
            bicepconfig.json > tmp.json && mv tmp.json bicepconfig.json

           # Copy to the dynamicrp resources test directory so the .bicep files there can find it
           cp -f bicepconfig.json ./test/functional-portable/dynamicrp/noncloud/resources/bicepconfig.json

      - name: Print updated bicepconfig.json
        run: cat bicepconfig.json

      - name: Verify Bicep files
        run: ./build/validate-bicep.sh
        env:
          BICEP_PATH: bicep
