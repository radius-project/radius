namespace: Test.Resources
types:
  userTypeAlpha:
    apiVersions:
      "2023-10-01-preview":
        schema:
          type: "object"
          properties:
            port:
              type: string
              description: The port number exposed by the application.
            host:
              type: string
              description: The host name (in-cluster service DNS) produced by a recipe.
      "2025-01-01-preview":
        schema:
          type: "object"
          properties: {}
  postgres:
    apiVersions:
      '2025-01-01-preview':
        schema:
          type: object
          properties:
            database:
              type: string
              description: The name of the database.
            host:
              type: string
              description: The host name of the database.
            port:
              type: string
              description: The port number of the database.
            username:
              type: string
              description: The username for the database.
            password:
              type: string
              description: The password for the database.
  externalResource:
    capabilities: ["ManualResourceProvisioning"]
    apiVersions:
      "2023-10-01-preview":
        schema:
          type: "object"
          properties:
            configMap:
              type: string
              description: The data contained in a config map.
          required:
            - configMap
  # Additional resource types for shared API version deletion test (GitHub issue #9754)
  sharedAPITestTypeA:
    capabilities: ["ManualResourceProvisioning"]
    apiVersions:
      "2023-10-01-preview":
        schema:
          type: "object"
          properties:
            configA:
              type: string
              description: Configuration data for shared API test type A.
  sharedAPITestTypeB:
    capabilities: ["ManualResourceProvisioning"]
    apiVersions:
      "2023-10-01-preview":
        schema:
          type: "object"
          properties:
            configB:
              type: string
              description: Configuration data for shared API test type B.
  testResourceSchema:
    capabilities: ["ManualResourceProvisioning"]
    apiVersions:
      "2023-10-01-preview":
        schema:
          type: "object"
          properties:
            validationData:
              type: string
              description: Data used for schema validation testing (must be string).
            numericField:
              type: integer
              description: A numeric field for testing type validation.
            configSettings:
              type: object
              description: Configuration settings object.
              properties:
                enabled:
                  type: boolean
                name:
                  type: string
          required:
            - validationData
  testValidPlatformOptionsSchema:
    capabilities: ["ManualResourceProvisioning"]
    apiVersions:
      "2023-10-01-preview":
        schema:
          type: "object"
          properties:
            platformOptions:
              type: object
              description: Platform options with type any in additionalProperties (should pass validation).
              additionalProperties:
                type: any
                description: Accepts any value. Valid under platformOptions.
  sensitiveResource:
    apiVersions:
      "2023-10-01-preview":
        schema:
          type: "object"
          properties:
            username:
              type: string
              description: A non-sensitive username field.
            password:
              type: string
              description: A sensitive password field.
              x-radius-sensitive: true
            apiKey:
              type: string
              description: A sensitive API key field.
              x-radius-sensitive: true
            credentials:
              type: object
              description: Nested object with mixed sensitivity.
              properties:
                host:
                  type: string
                  description: Non-sensitive host.
                secret:
                  type: string
                  description: Sensitive nested secret.
                  x-radius-sensitive: true
            connectionConfig:
              type: object
              description: A sensitive object containing non-sensitive fields. The entire object should be redacted.
              x-radius-sensitive: true
              properties:
                url:
                  type: string
                  description: Connection URL.
                token:
                  type: string
                  description: Access token.
            secretName:
              type: string
              description: The name of the Kubernetes secret created by the recipe.
              readOnly: true
